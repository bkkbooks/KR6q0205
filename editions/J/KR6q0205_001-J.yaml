body:
  text: 蕅益道人智旭著門人圓果錄願文九華地藏塔前香文丙子三月初九日稽首慈悲大願王本源心地如來藏善安慰說真救世現聲聞相護法者願乘本誓度眾生鑒我微忱垂加護我今然臂表精誠胡跪翹勤哀仰白弟子智旭夙造深殃丁茲末世上無師長以提攜下無同行相警策雖受戒品輕犯多端雖習禪思粗惑不斷迺至讀誦大乘僅開義解稱念名號未入三摩外則睹魔黨之縱橫痛心疾首內則見煩惱之紛動愧地慚天復由惡業備受病苦半身酸楚已經十載有餘三瘧綿纏又及半年之外痛娑婆之弊惡歎沉溺之無端由是扶病入山求哀大士付身命於浮雲矢菩提於永劫敬然臂香六炷一者供養忉利勝會化身無數地藏菩薩摩訶薩二者供養大集勝會現聲聞相地藏菩薩摩訶薩三者供養六根聚會善巧說法地藏菩薩摩訶薩四者悔我三業重罪所謂從生以來一切殺業一切婬機一切謗三寶罪一切口過一切意地種種惡念乃至舊歲染疾之後種種飲噉不盡如法借諸戲劇以自排遣如是等罪願盡消除五者為求四願願諸律儀恒得清淨願速斷惑證真實道願壽命長康強無病願充助緣廣作福事六者為決疑網若先禮懺求淨律儀若先觀心斷除煩惑若先閱藏以開慧解若先立行以廣福緣惟願救世真士大智開士一切知見者於諸眾生得不忘念者必垂哀鑒開我迷雲我復於大慈悲父前瀝血銘心作如是願如一眾生未成佛終不先自取泥洹倘夙業因緣牽入惡道願菩薩弘慈常覺悟我使我念念恒自憶菩提心令菩提心相續不斷若夙障稍輕願大士威神加被令我早成念佛三昧決生阿彌陀佛世界乘本願力及神通力廣於無邊剎海化度有情盡未來際無有疲厭惟願大慈大悲哀憐攝受十周願文六月初一日稽首釋迦大聖尊十方克盡人倫者真實至孝真實忠真實禮誼真師友所說究竟真實法真實如法修行僧我今哀請垂護持願賜慈悲同作證弟子智旭生逢末世福慧並微蒙二親獨養深恩罔知攸答始則違親教命造謗佛謗法重愆既而稍解真乘棄生事死葬大節本謂剋期取果頓棄家緣何意夙障偏多久滯凡地追初志而涕泗慚惶念未來而痛心酸鼻世出世法兩皆失措生報後報嬰苦無疑由是以恐懼心以殷重心於壬申歲作乞恩啟遍求師友同學菩薩比丘沙彌居士各發慈心各持經咒不惟先人蒙濟亦令不孝減辜是時即自發心持滅定業真言二千萬金光明空品二千卷梵網上卷一千遍互為勝緣擬於癸酉諱日即皆迴向又何意障緣多擾直至今歲入山方完梵網經數而病體沉重勉強誦持威儀不整散亂多端撫臆論心益增愧怖今值慈母棄世之辰加念阿彌陀佛洪名萬聲敬然臂香三炷匯諸善友所持經咒若完未完若足未足總申迴向比丘受籌持華嚴經一部淨名經四十八部梵網經百部十六觀經四十八部大悲咒一千無量壽真言四十八萬佛名四十八萬果海持梵網經菩薩戒本經四分戒本各三百部大悲咒一千往生咒一萬滅定業真言十萬阿彌陀佛觀音地藏洪名各五萬智淳持華嚴經一部大悲咒往生咒各三千佛名一萬大獻持彌陀經百卷佛名十萬惟忻持無量壽真言一萬法慧持大悲咒一藏普福持法華經一部佛名二十萬智西持法華經十部智地持一字大輪真言七日梵網經十部涅槃經一部法戒持大悲咒一藏成泰持大悲咒一萬妙真持大悲咒十萬大和持佛名十萬性筏背起信論一卷性妙持往生咒三千法清持準提咒十千大香持法華經二部心見持法華經五部大悲咒空品各一千智洵持梵網經百部智亮持梵網經二十部往生咒一千大建持梵網經五十部菩薩戒本四分戒本各百卷智成持佛名百萬沙彌圓果背梵網經一部持楞嚴咒三百行願品百卷彌陀經三百佛名十萬滅定業真言百萬常樂持法華經十部佛名三百萬淨依跪持行願品三百卷海量持心莫作放逸偈百萬禮拜阿彌陀佛三萬靈哲持滅定業真言十萬寂輝持大悲咒百遍彌陀經往生咒各百遍海明持滅定業真言十萬寂浩持滅定業真言十二萬靈琦持準提咒十萬明機持往生咒一萬成泉持大悲咒一萬成志念佛百萬智明念佛百萬優婆塞程智用持金剛經二百菩薩戒本經一百潘智海持金剛經一百藥師經一千佛名一萬潘智建持七佛滅罪真言二萬以此種種殊勝功德同共薦拔亡父鍾之鳳亡母金大蓮伏願決生淨土速證無生蒙授記於十方度含靈於五濁智旭又然臂香三炷轉為比丘沙彌居士乞恩三寶伏願受籌比丘痛念正法之衰盡革疑癖之病捨其偏執重修舊盟果海比丘福慧齊增證真實法智淳大獻及大建智成等各各志念堅固戒品昭明定慧圓修自他俱利圓果沙彌開發深智成就深忍壽命延長身心永固淨依沙彌念真實法生無上慧成忍辱力開福德門常樂海量及成志智明等各各道念彌堅戒德日懋福壽綿延慧性開朗優婆塞程智用離諸障緣成就二利以宰官身悟解脫道智海智建了悟塵緣增長信力捨惡住善堅固菩提又願智旭從今以去疾病消除永無魔障得大壽命得大助緣得大辯才得大智慧得大聞持得大禪定斷通別惑於剎那利冤親眾於沙界所有誓願無不圓成所有著述允可佛意所有佛事速辦無難所有開化悉皆領悟興釋迦正法於支那作彌陀輔弼於樂土紹地藏之家業傳觀音之心印等文殊之智海入普賢之行門以勢至念佛三昧自度度他以迦葉結集深心護法護眾俾邪魔外道遁影藏蹤使教戒禪那日昭月朗恭惟三寶垂慈滿菩提願持咒香文六月十四日稽首地藏王大悲觀自在總持妙章句及一切三寶救度諸苦厄能滿諸希願哀愍眾生者惟垂慈護持弟子智旭夙生業重現世罪深世出世法多諸魔障豈但不能剋期取果普報四恩亦且不能專修聖道弘範三界悠悠歲月放恣因循致使他緣逼迫惡疾纏身復以虛名所眩累彼若緇若素善友知識種種供養種種護持反躬內忖何德堪消靜言思之實增慚懼爰於六月初八日為始迄十四日為終屏息他緣結壇一七專誦總持章句奉報外護深恩敬然臂香供養三寶一者伏願比丘果海戒根堅固定慧圓明正見卓然能轉時流不被時流所轉決成大器作法廈之棟梁二者伏願沙彌圓果淨依增長壽命增長色力增長福德增長智慧大智大願大忍大識內外一如始終一致三者伏願承天寺照山房振宗持行靈秀廓照徹塵體寂用徵周洽隆恩聞性等各各於世法中無諸障難於出世法增長信根不離塵勞了見佛性四者伏願菩薩戒優婆塞程智用障緣消滅身心永安於佛法中深入經藏而智慧如海於儒業中早登科甲而大作金湯五者伏願正知韓逢祐解脫客塵清淨緣障了知恩愛猶如桎梏自然伏斷煩惱罪根身心快樂福壽並隆六者伏願錢士貴程通慧大心不退正見日昭自利則悟法一源利他則遍行四攝滿求子之凡心成弘護之聖行七者伏願沙門清沼永闃智瑋達淵明教行方祖心智洵常樂智音智亮智明智成成志性泓圓六圓淨慧先悟德定明常信海朗恒觀了凡及此地法雲菴興邦悟省等各各福壽增崇慧命堅固遠離災障成就道果善根已熟者今必脫善根已種者今必熟八者伏願優婆塞程智我馬成之姚年張贊育劉海晏萬應鵬陳淨傳王思湖沈三郎李載白及信女潘門鍾氏李門鍾氏王門潘氏李氏大姐李氏二姐等於世法中如意快樂於出世法志念深求未種善根者今當種已種善根者今增長欲行惡法皆悉不成所修善業皆得成就關閉一切諸惡趣門開闡人天涅槃正路九者伏願智旭從今以去病苦消除身心康泰福德增長壽命延長速完檢藏之願早遂斷惑之心著述開人天眼目字字懸契佛心營業作末世福田事事暢快本念又願與諸緇素知識常作菩提眷屬同生極樂勝邦俱蒙授記共化十方生生世世為影響眾在在處處為善知識直至道場永無隔礙十者智旭又為決疑拈鬮更然一炷供養三寶願以現知現見真實證明令我所拈之鬮決定靈感從此之後一意行持永無疑悔自利利他功無虛棄滿菩提願廣度眾生恭惟法界三寶地藏慈尊大悲觀世音菩薩同賜慈悲哀憐攝受閱藏願文六月十九日歸命法界大醫王種種應病妙法藥觀音地藏看病母願賜慈悲同哀護弟子智旭與法界眾生背常樂我淨之真性起無明煩惱之幻疾三惑為眾罪根元四大為百病窟宅保妄念而塵劫不肯捨離受毒身而輪迴無有窮絕乃至幸獲人倫仍嬰眾苦叨成僧相尚纏惑根被業浪之所漂沉遠正法而丁末運禪那教觀徒有虛名戒律總持咸無實義致使魔軍得便障難頻侵身則眾病交煎心則他緣逼迫欲行善事每不能成是以深生慚愧諦信因緣歸命觀音地藏二大慈尊求哀懺悔懇賜護持曾於三月十九日為始立願誦持廣大圓滿無礙大悲心大陀羅尼神妙章句二百七十堂以療惡瘧今神咒告完惡瘧漸愈益驗妙法恩力不可思議敬然臂香三炷供養觀世音菩薩及十方三寶願我從今以去普與法界眾生決定皆得永離病因永絕病緣永斷病苦永無病報身心安樂真性現前發起大心行諸妙行同生淨上同證菩提復然臂香三炷即於今日為始暫減恒課續閱藏經惟願法界三寶二大慈尊護法天龍一切聖眾慈悲覆護哀愍智旭令智旭此番閱藏決無障緣從始至終字字明解外緣則事事豐饒行人和順毫無片事擾心內行則精義入神隨文妙證決得聞持勝力普與法界眾生開頓悟門成正修路摧魔外之邪幢奪權小之僻執浴法日以重昭補義天而廣覆俾末運還為正運文字咸歸性靈法藥所霑沉痾立起法雨所潤枯槁旋生恭惟三寶及二大士垂哀證明滿菩提願完梵網香文丁丑三月初七日歸命華臺盧舍那千華上佛千百億梵網契經心地品玄通華光大智明亦禮彌陀大願王觀音勢至大海眾及我地藏勝慈尊同賜哀憐垂拔濟菩薩戒沙彌智旭自惟業障深重不遇聖時少則隨邪師教謗毀三寶長乃正信捨家知識已逝徒懷剋期證果之思誰下鉗錘辣手空抱摧邪顯正之志誰知孤孽苦衷僅有道友惺谷壽公猶能互相砥礪堪嗟隻履復先歸更有同盟歸一籌公差足互相酬唱深痛三人成市虎是以自他二利進退無成身心二病內外交發策拄杖而入深山埋姓名而藏醜陋復以佛慈密佑法性冥熏一息未亡四弘猶在而舊友如是昉公遠來相訪兼因薦拔之舉遂作講演之緣竊念梵網尊經久秘龍藏下卷雖有義疏而古略多含人罕妙解上卷則兩家草創皆隔門牆致使修證要途千秋貿貿旭以夙因微善得遇靈文再四潛心宛如故寶不辭鄙拙合註斯成敬然臂香二十一炷回向真乘一者奉供三身一體盧舍那佛二者奉供梵網心地教行理經三者奉供玄通華光主菩薩華光王大智明菩薩及文殊普賢藥王藥上金剛藏虛空藏彌勒金剛手等一切菩薩盡梵網海中發趣長養金剛十地菩薩摩訶薩伏願智旭無始至今身不善業口不善業意不善業謗毀僻謬種種罪惡皆得消除一切善根皆得堅固四者奉供極樂世界阿彌陀佛依正宣揚微妙法藏觀音勢至清淨海眾伏願智旭捨此幻身定生極樂華開見佛滿大願輪五者奉供地藏菩薩摩訶薩伏願智旭大智開明大悲增上離諸煩惱廣度眾生滅諸罪障廣代群苦六者痛念孝豐所請藏經未獲供養代為菩薩比丘心見供養三寶願心見比丘福慧增隆成茲勝事七者奉為先考鍾之鳳先妣金氏大蓮暨一切亡過六親眷屬等供養三寶願仗良因同離八難超昇淨土究竟菩提八者奉為泉州府開元寺一軒新示寂肖滿全公湛一輝公開林演公供養三寶願仗良因同生淨土悟無生忍廣度群迷九者奉為剃度恩師雪嶺峻公十戒闍梨戒宗孝公及道友惺谷壽公璧如鎬公自天浩公不忘音公月心愍公等供養三寶願仗良因滅除罪垢永離惡道得宅九蓮十者奉為邪師袁一柱及正師吳一標供養三寶願邪師永捨邪見不受邪報正師增長正信成就正修十一者奉為道友如是昉比丘供養三寶願令身心安樂福慧兼隆成千古之真品作末世之藥樹十二者奉為道友心見比丘性士比丘大建比丘果海比丘供養三寶願令色力堅固道念增崇荷擔正法作大棟梁十三者奉為菩薩戒沙彌圓果弘孝法同沙彌海晏形同沙彌覺非定猷通恒淨塵等供養三寶願令各增福德各長智慧各發大心各修大利破除習氣成就剛骨荷負法門永超權小十四者奉為山中一切隨喜結緣之眾若老若少若僧若俗供養三寶願令深植善根永為道種脫離塵網趣向菩提十五者奉為菩薩戒優婆塞程智用供養三寶願令世出世法皆離魔障早獲麟兒速登科甲轉父母親族之邪心成銅殿刻經之大願大作護法重興道化十六者奉為菩薩戒優婆塞徐弘鎧供養三寶願令早離王難增長正修得出世之淨福開微細之實智十七者奉為護法居士正知韓逢祐道昕陳丹衷大潮萬應鵬通慧程文濟及錢士貴項淨理項淨香等供養三寶願令道芽堅固智種深培福壽彌增正信開發三學資神四弘被物十八者奉為虛空法界一切曾受菩薩戒者供養三寶願令戒品堅牢細過無犯定共道共以同彰攝善攝生而圓證由三十心登體性地速成正覺滿足法身十九者奉為虛空法界一切受菩薩戒有毀犯者供養三寶願令罪障消除戒品復淨或重或輕或故或誤一切蠲豁永無累垢二十者奉為法界之中一切含識雖未受戒曾聞梵網名者供養三寶願仗良因同生覺悟發心秉受如法修持二十一者奉為法界之中一切含識雖具梵網真常佛性從不聞此名者供養三寶願以大慈悲力不思議力同體法性真實威力令其從今以去咸得聞此微妙法門生於正信發於正解離三塗超八難決登戒品並事真修展轉誘化同證菩提若諸眾生具有無始惡障所纏不能自拔昏迷倒惑不能覺悟者願以三寶究竟大功德力大智慧力大慈悲力阿彌陀佛無邊願力地藏菩薩勇猛誓力令諸眾生速能覺悟早拔苦輪設其定業決應受報願令智旭早生淨土一見彌陀隨乘願輪普於十方不可說不可說世界海中遍受阿鼻地獄劇苦乃至一切重輕地獄諸苦我皆代受令彼眾生先證菩提假使盡法界中乃至惟一眾生未成正覺智旭甘於無量地獄備受楚毒無厭悔心盡一切劫亦無疲倦智旭今日所有誓願悉同過現未來一切諸佛諸大菩薩所發誓願悉是一切諸佛諸大菩薩之所加被若智旭具有無始惡業應墮無邊大苦趣中神識昏迷不復自覺違今日大菩提心大菩提願大菩提行者仰願舍那慈父釋迦本師彌陀願王地藏悲母哀我護我覺悟於我令我於苦趣中憶今本願不捨於苦而度眾生又願以今然香發願功德因緣令釋迦正法重昭於震旦國中魔外邪風絕扇於恒沙世界持律者洞明持犯善識開遮習教者深知義理了達性修坐禪者擴悟心源不遭魔外念佛者事理圓融自他不隔又願一切法門人皆通達永無鬥諍堅固之愆盡革門庭施設之見念念紹佛祖心燈法法匯梵網性海情與無情同圓種智滅定業真言咒壇一百十日圓滿然香懺願文丁丑稽首業性如虛空滿分解脫滅障者我今持誦秘伽陀願滅自他諸定業無邊福慧互莊嚴成就希有勝功德見聞隨喜發菩提心地性藏同圓證婆伽婆佛陀妙覺者無上地摩訶一和沙無相無垢地阿訶羅弗明行足法雲地阿那訶慧光妙善地阿尼羅漢變化生不動地阿羅漢過三有遠行地阿那含薄流現前地斯陀含度障難勝地須陀洹觀明燄地須陀迦流照明地須阿伽一波道流離垢地鳩摩羅伽逆流歡喜地達磨邊伽波羅提弗陀波訶諦師羅叉伽羅叉必佛度阿法必阤必白伽羅曇沙羅羅諦流沙度叉一婆度佛阿度阿訶度沙必度生婆諦度利他度和差度只羅度安爾度伽阿流山迦必阿羅必叉伽阿毘跋毘跋致安婆沙流摩阿流羅伽流諦伽度流伽度信念進定慧戒向護捨願一切菩薩摩訶薩惟願大乘三寶若聖若凡同加護念同作證明聽智旭今日至心懺悔滿智旭今日廣大願輪胡跪合掌瀝膽刳肝作如是白我弟子智旭與法界眾生自迷真性枉入妄流隨逐無明增長惡業無始至今曾未覺悟所積罪障無量無邊賴聞地藏本願經發心出世更遇滅定業真言立志利他將為銅殿之緣先課加持之行既勸同仁共持十萬萬遍兼復自勵專持五百萬聲敬詹丁丑五月十七日為始至九月初八夜為終十日方便百日正修結如法之淨壇受一食之勝行仍於道場將畢默課行法助成一七熏修六時行道以此功德仰祈銅殿大緣速能成就占察壇法早獲流通誦持既畢恭然臂香三炷供養法界三寶耑求加被所願克圓又念種種定業皆由身口意三廣造十惡惡法既成如弦發箭勢須遠到理無中止雖大士悲心不可思議真言神力不可思議亦須新殃永斷方乃故愆俱亡而撫躬內省慚悚彌增我實婬機未淨云何使人永淨婬機我實盜意未忘云何使人永忘盜意我實殺習未除云何使人永除殺習我實妄言綺語惡口兩舌種現未消云何使人永消口過我實貪瞋癡起現不停云何使人永停惑毒嗚呼檢點一身渾是短羞惶半世已成虛扼腕痛心號天慟地更然臂香三炷深自悔責亦為法界眾生求哀悔過伏願從今以後十惡消除三業清淨不造未來之因不受過去之果又然臂香一炷供養五臺山妙峰老師及雲棲和尚憨山師祖紫柏大師密藏尊者一切真善知識願以福慧力同加覆護令我所願速得滿足又為九華山中舊住主人東西二寮若長若幼一切眷屬持滅定業真言二十萬然香一炷供養三寶願令各增福壽各長慧根以無我心善和鬥訟以忍辱法開導後昆永無自他彼此之私痛絕勝負是非之見人人為地藏功臣念念惜法門羽翼又為現在成就藏櫥自照性士大朋等及一切助緣善友別持真言十萬又為將來成就普同塔事自照興邦悟省及一切助緣善友亦持真言十萬總然臂香一炷供養三寶願令各得增長壽命增長信心增長福德增長智慧增長慈仁增長安樂增長勝事增長道風又為九華山中來聽法者一切與會隨喜結緣眾友別持真言十萬然香一炷供養三寶願令各發菩提大心同修戒慧真道永捨流俗知見堅固無上勝猷又為往來此山流寓此山一切緇素別持真言十萬然香一炷供養三寶願令各念大士深恩各護法門大體掩惡揚善嘉智矜愚力懲破法之心猛作干城之助又為菩薩戒優婆塞程智用日持大悲神咒七遍中舉為期為其父親惟明代持滅定業真言五十萬為其族弟智我優婆塞日持大悲神咒七遍進學為期今更加持真言十萬然香一炷供養三寶願令智用早歌麟趾深慰孝思及與智我同冠進賢堪為屏翰不忘夙昔之盟急酬銅殿之願又為菩薩戒沙彌圓果舊持真言百萬今更加持五萬然香一炷供養三寶願令開發憨蒙拓鍊弘毅深培福壽之基永離作輟之習立躬如泰山喬嶽矢志必涵坤蓋乾又為法同沙彌常樂海晏形同沙彌覺非各持真言五萬共然臂香一炷供養三寶願令從事入理得大總持成就五根發明五力三障圓消萬善克備又為菩薩戒比丘果海日持真言三百十夏為期共計百萬加持大悲神咒七遍成器為期兼為大建成泰共持真言百萬今更加持十萬然香一炷供養三寶伏願大建比丘身命堅強智慧敏銳永捨攀尋枝葉之習了悟直捷根蒂之功析義如庖丁解牛得理如鵝王擇乳成泰比丘專求己過毋責人非了知將就苟且難出生死牢關深信駑駘顛蹶不可橫超淨土猛策新猷莫仍故轍果海比丘慎思明辨沉細精微痛革浮氣粗心未會先會專求深造自得若無若虛悟明文字三昧似獨繭以抽絲善能入理深談必敲骨而取髓又為法同沙彌淨依舊持真言百萬為形同沙彌通恒今持真言十萬為形同沙彌淨塵日持大悲神咒七遍成器為期加持真言五萬共然臂香一炷供養三寶伏願淨依折伏貢高斷除我慢深培福壽專務思修省己之短慕人之長下學上達即事鍊心通恒災障消除戒根永固福壽增長定慧圓明成大法器作大棟梁淨塵身康壽永福長慧增雄勇特達剛毅果敢超群拔萃破格剖籓大法自任千古自期又為菩薩戒比丘心見道昉各持真言五萬共然臂香一炷供養三寶伏願心見比丘福德增長智慧開明方便善權攝化緇素莊嚴大藏速得圓成道昉比丘名心霧散覺意日明莫念鼻孔撩天但顧腳跟著地立行則徹始徹終惟向一門深入求道則惟精惟一不從多法浮貪雜想應時消落三學當體圓明又為大賢大真大擒大文受籌靈山清沼永闃大硪道震共持真言十萬然香一炷供養三寶伏願賢等福慧增崇煩習永斷荷擔正法自利利他又為智仁智洵性觀定猷成志照乾海量照德智瑋明教共持真言十萬然香一炷供養三寶願令緣障頓消二嚴克備勤修出要永離妄因又為一切禪者一切學者持律者念佛者瑜伽者邪命者雲遊者務農者絓是著如來衣現僧伽相踐伽藍地冒出家名盡三天下所有緇流共持真言三十萬遍然香三炷供養三寶伏願狂誕狐禪盡轉而為宗說俱通之龍象鑽紙蠅學盡轉而為隨文入觀之獅猊羺羊戒子盡轉而為定共道共之律轔狼狽蓮宗盡轉而為猛智慧行之角虎客作瑜伽盡轉而為神通變化之高流禿頭商賈盡轉而為六度萬行之導主雲遊賊住盡轉而為頭陀勝行之芳標農事僧民盡轉而栽法界園田之靈種又為菩薩戒優婆塞徐弘鎧日持大悲神咒七遍脫難為期加持真言五萬然香一炷供養三寶願令釋結解怨早離障難悔過遷善增長信心不負夙根成就法器又為菩薩戒優婆塞陳道昕舊持真言十萬為優婆塞項淨理舊持真言十萬為韓正知錢士貴胡汝淳程通慧項淨香等今持真言十萬共然臂香一炷供養三寶願令各增正信各長威力世出世法所願從心永作金湯進趨覺路又然臂香一炷供養地藏慈尊將此持咒然香功德并及向日為亡父鍾之鳳曾持千萬為亡母金大蓮亦持千萬為法界有情又持千萬為一切師友同學弟子檀護怨親知識等所持若九十萬若三百二十萬若四十八萬等乃至若為延生若為薦亡若為悔過若為除災若自為若為他所持真言若多若少若至心若散心皆悉攝取現前普同迴向又復普化大心緇素共持十萬萬遍若化未化若完未完過現未來一切功德亦皆攝取現前普同迴向深心信解真言威力不可思議一一字中圓具法界無邊功德一切字中亦復如是以此重重無盡不可思議功德威神令我一切得如所願滿菩提願又然臂香四炷重復供養法界三寶及地藏大士求決所疑至誠占於第三輪相一者依占察法先悔罪障二者住阿蘭若先修禪定三者著述弘經先修觀智四者植諸善本行眾三昧懇乞大慈分明指示令我此生不致浪死又香三炷供養淨土三寶以此功德悉皆迴施法界眾生願共一切眾生捨此一期報身決定同生極樂世界永離苦因苦果速證菩提涅槃
