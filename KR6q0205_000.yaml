body:
  text: 絶餘編序生平行履百無一長獨有大菩提心忘身為法捨己從人則堪質諸三世慈尊者也自庚午至甲戌五年之中幾經困衡曾無退悔蓋因乙亥仲秋復遇一友背盟而此志遂不啻如稿木死灰矣丙子春本擬遁迹萬山深處甘與野獸同死途中大病逗留九華哀禱地藏本師仍得閲藏著述之決乃不復與文字般若為讎嗟乎文字性空性空即是實相實相離一切相即一切法豈離文字而解脫哉追思昔年焚棄筆硯絶而不絶今也不絶而絶矣非絶非不絶而論於絶絶無絶相姑名絶餘知我者其惟此編乎笑我者其惟此編乎吾以俟諸後世子與可也崇禎壬午仲夏藕益道人智旭書於吳興之鐵佛觀堂絶餘編目録序卷一願文六首卷二法語十首傳一首卷三序三首題跋五首書柬十一首雜文二首疏六首卷四讚十一首銘二十三首詩偈一百四十九首附對聯四首
