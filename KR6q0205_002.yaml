body:
  text: 蕅益道人智旭著門人圓果録法語示朗融萬法本自融徹由迷情封執而成隔礙如一指能蔽山嶽如認漚必遺大海不惟埋沒自己靈光亦且冤屈六塵境界詎思六塵非能惑人人自妄受六塵所惑根根幻馳識識紛動然仔細推求塵既不居其咎根亦豈職其愆根既不職其愆識寧獨當其罪三科分析既無真主縱令共合那有實法而衆生於此虛妄法中著我著人分取分捨猶如捏目亂華發生更欲分別花相孰妍孰醜孰大孰小不亦惑乎惟將身心世界全體放下作一超方特達之觀譬如為天下者不顧家則智眼昭明而一切障礙境界不覺其融于性德無往非真實受用處矣示三止永嘉大師有云惺惺寂寂是無記寂寂非寂寂惺惺是妄想惺惺非此四語叢席爭傳誦之然先須徹悟惺寂源頭方不墮守精魂窠臼即如儒者亦云明鏡止水以持心豈可謂慎獨工夫便是禪門中奢摩他妙修行路耶四祖謂牛頭云觀者何人心是何物只此二語直得遍計妄想百雜粉碎以此體真以此方便隨緣以此息二邊分別一句中有三玄一玄中具三要喚甚麼作獨將誰去慎不惟妄想無記無處容身恐惺寂二字亦并無處著落非惺非寂是謂寂寂惺惺惺惺寂寂喚作不二早已二也況可云雙修並運哉悟此成修是名一心三止待時而説乃成法華三止自利利他俱不離此一字法門能於一滴水中興雲澍雨貴在神龍之自奮迅耳示文約做工夫人每每被昏散二障所擾不得成就久久便致退悔殊不知昏散根源全由迷己作物故楞嚴經云認悟中迷晦昧為空乃至昏擾擾相以為心性夫昏則障慧擾則障定定慧既障則睡眠與散亂雜呈若欲去其根源先須識取心性本體從來明靜諸佛證之為定慧行人修之為止觀止觀之功全即明靜之體惟靜故明惟明故靜既非二致豈有前後但約對治法門昏蓋重者以觀起之散亂多者以止息之息散之止非無觀起昏之觀非無止止觀不二勤修不息自然本體漸露客塵漸銷要知這著工夫大段間斷不得又大段性急不得所以儒門貴勿助勿忘佛門喻以彈琴太緩太急皆所不取然欲除昏蓋直須打起精神不可貪戀蒲團穩坐而欲除散亂正不必厭惡妄想直須覷破妄想無性則自然休去歇去故僧問巖頭云起滅不停時如何巖曰咄是誰起滅只此一語可為明心見性者作第一先鋒也示慧幢上座豫讀子輿氏書至舜盡事親之道而瞽瞍底豫忽見圓頓觀心要旨焉夫父雖至頑不可捨之而別覓他父雖頑父即我真父不可如傲象之順命為惡順命為惡非事親之道也捨父別覓又可稱孝乎現前介爾一念亦復如是全體即是無明又全體即是法性無明猶頑父也法性猶真父也順無明流造業流轉猶如傲象捨妄覓真別觀法性猶如背父逃逝雖善惡途轍稍殊其為不孝均矣六道凡夫順無明而為惡者也藏通別三種行人捨無明而逃逝者也若知焚廩掩井之瞽瞍即是允若底豫之瞽瞍則必盡事親之道于己躬而肯作順逆兩法以虧天性耶所謂盡事親之道者亦只是深信父實生我除此父外別無真父然斷斷不可從命為惡直須竭怨慕之誠以格之則頑如瞽瞍亦可回心況未必如瞽瞍者哉觀心亦爾深信現前一念全體法界離波覓水終不可得然斷斷不可隨其生滅不事觀察直須以不思議一心三觀深體達之則縱令惡無記心尚成不思議境況善心哉知一念中圓具三德祕藏事理兩重三千互遍互融深生信解名之為慕此境若不現前只是止觀力微發勤精進誓以十法成乘名之為怨若能如此努力縱鈍逾般陀也須發明有日倘悠悠忽忽縱利逾藍弗敏過達多的的無濟也上座久種善根信力牢固但平日學問不知除卻求放心外更無餘訣所以千經萬論不能同條共貫今山中聚首一載復欲相別惟此一味單方相贈能服此藥實為千里同風若謂此外別有則是自欺自誑雖歷劫同住終是未曾覿面矣況色力有限年光不多奈何泛泛遠求而不束其功于緊要地乎至于借事助理則大悲行法以求壽命為開眼之地梵網全經以求圓解為起行之本佛號千聲匯歸淨土為歸趣之地然事非徒事全事即理因果圓彰自他不二貴向頭頭法法中徹見法界源底只是一法界更無二法界所謂一以貫之儒教尚然況圓頓佛法乎思之擇之示未能珠生濁水蓮出淤泥從來聖賢豪傑固不擇地而生但習俗移人賢智不免非有大識見大志氣大力量大方便鮮克自濟求其無待而興不受幻境所侵奪者厥惟艱哉夫所謂幻境侵奪者不惟順流俗而與之俱化也即使厭流俗而切思遠離亦名被其侵奪以一切境界全是無明變現無明變現之性全即法性由不達故橫生欣厭欣成六道厭墮二乘去無上菩提遠矣欲趨無上菩提者固不得隨順幻境亦不得厭離幻境但了幻境即法性悲長夜之在迷以悲迷故起無作二誓欲拔性德之苦以了性故起無作二誓欲與性德之樂如此慈悲誓願方與地藏法脈相應亦與十方三寶氣分交接先須方便發此心已則一切不如法境界一切末世惡態惡習觸目警心無非助發菩提資糧故起信論云或有菩薩見法欲滅為護正法故發菩提心或有菩薩見衆生苦而發菩提心正謂此也四諦之中苦為初門娑婆世界修行一日勝于淨土修行一劫法不在泛涉會心者妙藥不論貴賤起病者良見思之病雖急但是其標無明之病雖緩卻是其本急則治其標緩則治其本皮既不存毛將安附坎坎伐木不如并大地而掀翻之夫所謂掀翻大地者秖是諦觀現前一念非自非他非共非離三際叵得十方無朕廓然太空森然不滅無倚無依思議不及海印炳見橫遍豎窮如一念一切諸念亦復如是念性固然非關觀得藉觀圓顯生佛同歸觀而未顯障由三惑弘誓策發止觀安心破遍護通調停道品事理圓進六即防非安忍離愛功成無惑萬勿悠悠視作等間擬心姑待他日又萬勿急急欲圖脫離不知藉境鍊心昔陽明學步墜五斗米于兩足循堂而走去米之後其疾如飛即做工夫第一妙喻也靈犀一點通尤須善此訣竅示慈昱佛法大海信為能入智為能度信如堅舟智如柁師其餘五度及萬行則皆舟中器具也欲令信心增長先須時時念生死苦警悟無常不得沉迷五欲執著世情以種種世情決定了我生死不得種種五欲決定牽人入放逸坑墮惡道苦今雖處在煩惱之地也須隨緣稍自勉拔豈可尋波逐浪直至沃焦而忘返耶既能于生死長夜中發得一點真實信心即宜急求智慧以為導師求智之要第一在親近明師良友第二在讀誦方等大乘非明師良友決不能益我身心非方等大乘決無有出世正楷若人有信心而無智慧則能增長煩惱若人有智慧而無信心則能增長邪見故知船及柁師相須度險缺一尚自不可況復俱乏則茫茫苦海安有出期古人云一失人身萬劫難返此身不向今生度更向何生度此身莫謂火燒眉毛且圖眼下殊不知人間五十年不過四天王一晝夜耳倘不信後世苦樂只如臥時身本在床夢中種種見聞不滅豈可作斷滅見哉高明之士早自著眼可矣示迦提關主法華一乘妙旨惟令一切衆生開示悟入佛之知見然佛之知見非他即諸法實相是也諸法實相非他即現前一念心性是也現前介爾一念不自生不他生不共生不無因生未生無潛處欲生無來處正生無住處生已無去處心無心相則其性無生無生故無住無異無滅無生住異滅即真法性橫遍豎窮不可思議若于此無相妙心妄謂有心相可得則佛知見便成衆生知見若即此妄相幻心達其本非有相則衆生知見便成佛之知見而此一念心性既舉體全空亦復即假即中以三諦宛然故三觀亦自法爾以法爾之三觀照宛然之三諦能所不二境智互融于此妙法能生信解名為隨喜解義觀文名為讀誦轉示他人名為講説歷事煉心名為兼修正修五品功深六根斯淨似成真發究竟可期有相無相二安樂行一串穿卻秖貴篤信力行別無奇巧方便至於十妙五玄四悉三法皆是一心圓具説之則名相紛然照之則海印炳現如人飲水冷暖自知當非筆舌所能罄矣示乳生夫置身于海中孤洲而伯牙善琴其情移也望之似木雞而餘雞無不走者其神全也世間小技尚非聊爾可以奏功況欲學出世大道仔肩如來正法者乎是故智者大師所明圓頓十乘觀法必先之以二十五前方便所謂且五緣訶五欲棄五蓋調五事修五法就此二十五事復各具表法及觀心法門夫然後正助合行事理雙備如足目並運安隱入清涼池後來禪士講徒各自率情任意逞一得之見罔達大方軌則以此鹵莽薎裂學問求成一世間伎術戛戛乎難之而欲投足宗教兩途思以自利利他誠奚望也是故真正學人必先移其夙情則神自全情之所牽雖萬別千差總不出色聲香味觸五種神之所虧雖亦受病不等總不外貪瞋睡掉疑五種急須訶棄則聖賢可階梯而至矣易曰山下出泉蒙君子以果行育德又曰蒙以養正聖功也深思果行育德二語方識養蒙之法文殊師利勇猛智普賢慧行亦復然以此出世法乳自養即可兼養法界衆生莫患世間無子期也又示乳生夫不易移者習情必有以忘之而始移不易全者元神必無以戕之而始全今以半耗之神日汩于久沿之習欲求超凡入聖制外降魔安可得乎世之悠悠無志甘與草木同朽者誠無足論最惜徒有大志弗能自拔設思自拔曾不時時自省究竟與無志者同歸哀莫大焉試一自省則晏安習氣華靡習氣溫飽習氣貢高習氣疑惑習氣詩文習氣較長競短辨是爭非習氣乃至尋行數墨依文解義習氣凡所可昏擾我神明者六時之內何等紛紜雜沓而依教觀心澄思懺過縱有萌櫱之生蓋不啻一暴十寒矣且人命呼吸轉眼無常眨得眼來已成隔世儒者云才説姑待明日便不可也況二年三年耶九旬同住信非偶緣只恐奕秋未去鴻鵠先來情如故而神愈戕耳必須時時對了義以移情念淨戒以全神庶不負一夏盤桓不負出家初志否則魚子菴羅華喻亦可懼也高明之自憂能如杞人之代憂斯大幸矣念別情深書此以期他年刮目示懸鏡奮發之心人皆有之而不能不藉于外緣羞惡之心亦人皆有之而不能不汩于惡習嗚呼娑婆國土善友罕逢惡緣偏盛自非咬釘嚼鐵刻骨鏤心其何以自振拔哉惟有智之士鑒物理之無爽達未然之禍福趣吉避凶取決于心而不惑于數故能知天立命超死脫生然知天立命超死脫生之事人皆可為即如賢契乍聽大佛頂經便能然香立誓豈非真正出世種子但貴時時提醒此心念念不離了義經典則善緣淳熟魔境自退舍矣勉之勉之傳壁如惺谷二友合傳壁如禪師諱廣鎬台州王氏子俗名立轂號伯無父士琦為大同開府以清廉著名師弱冠時即有出世之志禮雲棲蓮大師取法名受五戒萬曆丙午舉孝廉甫年二十七歲越兩大試不第遂慨然就選蓋以世為廉宦家業甚薄而仰事俯育之纍未完急欲完之以圖出世也令新淦愛民如子民皆感恩頌德但因居官事冗戒德稍疏戊午冬入覲舟次荻港夢鬼使攝見冥王王責以破戒事驅令入獄傍有冥官代請為取破戒後諸事查之見其善多惡少乃釋不入獄鑿兩眼釘諸柱上及至醒悟則雙目不能視矣醫者進明目之藥復夢為冥王所訶更以二釘入眼腔中大痛失聲而醒遂不服藥告病歸鄉就台山高明寺傍築室間居日課金剛般若并大悲心咒行法不一年漸漸復明諸親友見其無恙勸令再仕師歎曰人生幾何猛求出世之不暇猶暇作蝸角蠅頭活計乎特以太夫人在未忍捨去耳尋思既欲離俗復以母在為礙豈可不願其母臻上壽耶而太夫人亦女中丈夫篤信三寶每率其媳及女孫晨昏課誦魚磬琅琅恍若禪宇遊僧過其門必設蔬供無空過者嘗見有人子出家而父母悲泣必笑之曰出家乃第一好事應須慶幸何悲泣為設吾子出家吾決不作此態也師由是得安心遠遁剃染楚中單身行腳備嘗諸苦既登戒品掩關閲律并書華嚴大法次從楚地遊歷匡廬峰頂諸處徐到博山隨衆參禪人無知者豫適同歸一送惺谷至博山剃髮師昔為居士時住高明靜室曾與歸師交今雖現比丘相歸師猶倣佛其形一日在衆中執其手曰公是台山高明寺回生王伯無否師不容自諱為歷敘所以出家狀且悲且喜日見豫與無異禪師辨論受戒一事最為詳悉因歎近來律學甚為淆訛本以破戒親受冥譴久欲留心此道而歷叩名德律主罕有不聵聵者豫出毗尼集要示之師亟讀亟賞歎未曾有遂與盟千古交又知豫方事閲藏復以啓囑豫曰三藏義類宜總為一書三藏酌要宜別為一書諸宗集目宜別為一書佛事稽古正訛宜別為一書發菩提心集六度集宜為二書毗尼中衣事鉢事及授戒説戒羯磨諸事日用間宜行者當輯附於集要之後梵網經雖前有二大士發明今宜補以彌勒戒本及諸經中所説有相發者集附本條之下然後自出手眼以補前人之缺亦不失為二大士忠臣勿以避嫌失此勝事沙彌戒優婆塞戒俱要少有發明附於集要以上事凡八則弟往讀契經薄有微願恨齒逼遲暮精已銷亡近又作蒲團活計故不能填也幸逢郢匠敬附當機倘三昧酒消尚冀奉襄半臂不爾者當結縞帶於來生矣豫唯唯謝曰弟亦夙有此志可謂不謀而合第六第八兩事業已為之餘亦當如命耳未幾南都余太僕請異師開堂異師意欲師與我輩同行師固執不從遂掩關於東峰靜室次年異師示寂師出關襄理後事既畢適太夫人以其道伴訃音至師乃歸浙省親太夫人語之曰豫嘗謂子設出家吾不悲泣今果然否勉矣進修吾自善養餘年汝子亦善能讀書勿以此挂懷妨出世大事也師奉慈命乃遊學於武林挂錫蓮居與新伊法師莫逆時豫自皋亭將入孝豐取道武林復與師作數日盤桓師囑豫曰毗尼集要弟雖預參訂而實未淹浹擬從師授講然後身服習之不令付諸空言但今遇華嚴法席不能相隨餘生若在準於明歲入山結夏耳詎意不旬日間即嬰微疾師亦預知時至命侍者寫囑言留貽二子攝心念佛而去嗚呼以師之敏而好學解而能行其出世正因懷菩提大願謙光厚德飲人以和真無愧蓮師法脈天竟不假以年豈非法門之大不幸乎師生於萬曆庚辰卒于崇禎辛未世壽五十有二法臘五年示居學地故衣鉢無傳唯回生紀一卷流通於世佛日金臺法師敦法門之誼塔其全身於皋亭山麓惺谷禪師諱道壽溫陵何氏子俗名啓圖為文學時偶得憨山大師楞伽記閲之且讀且泣遂發出世心捐棄舉業專究宗乘因父在不得出家即以居士身與道友如是雨海等日相砥礪時泉南久乏聞熏緇林中曾無一人知參方行腳事者師鼓舞其一二英傑破格遠遊從此閩中緇素始稍稍有發心北學於江浙者師初至匡山謁憨大師見其規模闊大而於商究生死一事不甚親切遂捨之而歸博山博山居以別室勉以參究居年餘每與異師諍論甚厲侍者多厭惡之唯異師不以為怪知其別有長也然異師法門必欲先定後慧師自揣種性應須先慧後定藥病不投莫能相療因東遊武林訪無盡法師於天台見故友歸一師德業俱進疑法師必有出格鉗錘依之而住得閲妙宗鈔等極則教理回視昔時慧解倍覺精細後因劉大參延至吳門從吳門復遊杭州至龍居豫是時亦在龍居閲藏主人命師訪豫一見即問豫曰師平日有著作否豫以白牛十頌示之師大悅遂欲與豫盟千古交豫時心未以為然相聚既久每議論佛法輒與豫破格大諍聞者亦厭惡之豫固坦然不怪但以其為居士也未必細加詳察後因歸一師同結冬偶商及耳根圓通法門歸師則持公論竟是師而非豫豫方服膺因虛心再研舊日諸諍負墮處實居大半矣乃共締千古盟激令早現僧相師以舊禮博山既無大故不忍背捨會須往彼剃度歸師與余欣然送之到博山異師手為剃髮而未受沙彌及比丘戒蓋受戒事曾先與季賢師約必欲重復古制故也庚午年春豫病滯龍居師與如是師在南都豫誠恐一旦律學無傳然臂香刺舌血作書促之至師乃同如是師來來則禮季賢師為和尚覺源師為教授闍梨新伊師為羯磨闍梨力復如來舊規如法受沙彌及比丘戒唯菩薩戒不重受以其為居士時曾受之博山也結夏安居聽豫講毗尼集要而師久習宗乘得其大益亦未免染其流弊竟不能留心律學但恐負豫苦心知金臺法師虛懷好善遂以集要力請流通辛未年秋師竟以疾示終佛日嗚呼師亦最奇人也為法門則每觸時忌為道友則每忘自身而慧眼超群機辨峭拔往往以短兵取勝雖名禪宿德欲與之戰大似撼嶽家軍倘馴而致之即兜率覺範豈多讓焉豫方謂博山有子青出於藍何意其入滅之速耶師生於萬曆癸未至崇禎辛未世壽四十有九法臘二年金臺法師説偈而荼毗之令其骨塔與壁師之塔相鄰吾聞昔人欲葬梁鴻覓要離之墓而附近之千古以為具眼金師此舉亦一快也師與如是師同禮博山亦同受具戒而如是師以受師益處最多同雨海居士輯師平日手札名為筆語而流通之述師行紀而彰表之執弟子之禮於身後為天下後世之重名相而輕法恩者愧云方外史曰二師皆豫最善交也壁慈而溫惺悲而厲壁聰俊而詳明惺沉毅而精鋭壁日讀數卷過目無不了了惺涵泳一偈一句動經旬月不置是故惺讓壁之博暢壁服惺之瑩徹壁所至處人皆愛之惺所至處人皆畏之壁惟欲受人之益而未敢益人故以能問於不能以多問於寡乃至臨終猶合掌問法令侍者代為拜謝惺惟欲益人即名自益故從閩中至江右從吳下至武林無一處不與人諍辨乃至臨終猶追念昔時道友不置如是師勸以宜顧自己勿念餘事則厲聲大叱謂千古安有自私自利之聖賢噫孔子謂不得中行必也狂狷孟子稱伯夷下惠同為聖人若二師者春蘭秋菊正不妨各擅其美又奚必兩融始名全德哉其與豫交善也壁師則欲受豫益不得不稍以微辭益我惺師則欲益於我亦不得不稍受豫益此皆其生平破格處也獨可痛者壁師欲學毗尼而有志未遂惺師既聽毗尼而不能力學如來正法誰共仔肩斯誠千古有餘憾耳嗟乎一月之間二師相繼而歿豫雖猶有一二同志然或但能受益而不能益我或雖稍可相益而略遇違緣復掉臂長往矣豫更何所樂於人世是以浩然永歎而甘沒齒於深山也弟子普滋損資刻此絶餘編兩卷奉薦先師中白融公先父馬應龍先母徐氏伏願三障圓消超生樂土早成佛道廣度衆生
