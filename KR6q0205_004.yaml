body:
  text: 蕅益道人智旭著門人圓果録讚觀音大士像讚白者是紙黑者是墨何處有紫竹林甚麼是磐陀石希有大士無作妙德不向空中現影偏借靈於手筆識海波澄月影寒蒲團葉翠苔痕碧善財合掌是何年同體大悲親薦得只今頂禮復是誰圓通還向耳門入南海波斯到岸來明珠價直微塵國海潮大士像讚疊浪層波一倫圓照磐石嵯峨毗嵐鼓竅加趺坐斷緑苔痕動靜融歸聞性妙大悲三昧瞥相親鼻端徹聽巖花笑蓮舟大士像讚波翻浪湧性定心澄慈心三昧霧靄雲蒸咄蓮華一葉輕如許法界收來勝不勝海湧文殊像讚一片青山無邊波浪動靜不生奇形異狀湧出寶蓮文殊在上大智勇猛識風鼓蕩若欲思量命失身喪咦如意拈來觸背融白毫全體光明藏十八應真像讚二首題貫休真蹟出山七尊石梁橋畔煙樹古中有峭壁方廣戶石梁橋下水流急曇花燦爛侵眉宇應真見道不見山出壁登橋任仰俯風動幡動兩無關回首依稀識師主獅顰豹變不驚情梵冊華言覿面呈肩輿坐斷十方界力士安知腳底輕拈來拄杖沒巴鼻玄機問取徐行麠下座芒鞋誰未破卓哉難弟復難兄水閣十一尊波濤萬頃噴山顛樓臺幻出雲霞聯乞士何時應供返袈裟馥鬱沾龍涎杖藜斗笠閒家具鉢盂布袋空相傳化城寶所誰遠近古木巖花孰後先龍王翹體迎還送風不揚塵石自動倚欄共聽海潮聲聞機剝脫虛空痛天際茫茫識浪平涅槃生死鎔情凍老僧手腕具神通筆端三昧稱如夢達磨祖師像讚二一句安心語萬劫繫驢橛轉得鼻孔來虛空出鮮血怪底東施強效顰卻令西子蒙不潔何如分付老雲門早與瞿曇同打殺驀地西來大似無風起浪更加折葦不免眼下栽眉饒君面壁九年落得弄巧成拙賴有楞伽四卷且喜救卻一半咄逢人切忌錯舉九華化城寺大圓禪師像讚咄咄老僧不唧溜漢性火真空兩重公案八十餘年贓已追留下家私誰共算大圓光裏笑呵呵邈出真容只一半任爾人天供養繁面孔依然歸那畔龍庵老人像讚海潮大智九子龍菴但修實行不貴空談視十方為一體杜後裔之癡憨披紫衣而慈容坦坦執明珠而佛號喃喃神雖久歸安養名猶昭著東南夫惟煽慈風於無盡能令禮遺容者宛如面參博山無異師伯像讚有序豫昔送惺谷禪兄剃髮始晤師伯追隨至金陵而別盤桓一百餘日每談及法門流弊擬相與共拯之不意僅年餘而師伯示寂遂令豫獨掌隻輪不能浪鳴單運豈不痛哉邇來頻見為宗匠者輒以東瓜印子印人致使宗風掃地緬懷師伯受用壽昌不肯二字終不以佛法作人情凜凜有古人風倍切思慕適知十禪兄以遺像索題悽然久之合掌讚曰貌偉神豐心慈體徑向空觀以入門從壽昌而斷命堅持不肯家風痛洗今時禪病既存徹困婆心何必單提正令只嫌一句葛藤窠留與兒孫作話柄沒蹤跡處莫藏身老婦依然猶歎鏡銘淨信堂銘我所住堂皆名淨信輪相初開破疑前陳五悔功成至心發軔二觀圓融隨機善進平等法身三昧中俊觀察己心念佛正印決定應離雜亂垢燼三忍四佛康莊非峻梵網室銘我所住室即名梵網十方佛法猶如觀掌文字性離非默非響更言不立無端成兩心地法門戒光森爽性修交成實相斯朗法報化身體方且廣華藏莊嚴鏡中現像墨銘十六首靈光獨耀一性色真空性空真色一字法門圓融萬德赤澤摩尼二徑寸妙寶五天價高穰穰珍雨稱性無勞琉璃液三南埵須彌內外明照印徹香河色塵圓妙烏金髓四寶明生潤天一地六神丹告成名歸仙籙空青乳五蘊結何依津流非滓點開普眼法界洞視紫雲根六舒卷無性出沒有端瀰空梵字五眼同觀含音七四辨離微如來之藏法鼓未撾魔軍先喪攝電八慧雲瀰覆警聵開盲剎那三昧耀徹幽城驪珠九探之頷下出自深淵高幢懸置光燭大千禹璧十治水功成恩垂永世玄之又玄非從人製月華十一剛中習坎克粹其精照此長夜識海澄清霞燦十二非水非天亦真亦幻映彼金沙優曇方綻凝碧十三迥矣霄漢呈此佳祥點畫未兆文彩已彰蒼露十四月照芙蕖香含湛湛挹此明珠鬚眉可鑑靈草十五著耶苣耶産于何土香光莊嚴法性玄圃玄芝十六香水海畔有七金山育瑞朵朵服之童顏方竹杖銘五首藏虛于實寓圓于方拄天匝地隨君舉揚咄轉身何處尋蹤跡驀直歸家夜未央贈葆一兄直既中繩方亦中矩煙水百城賓中識主贈如是師徑節虛心相對何語離卻有無誰奪誰與贈積如丈不存軌則聊示方隅肩雲戴月逸塵而趨贈知十丈毋刓汝體毋露汝端捨之栗栗用之跚跚自題詩偈山居百八偈有小引抱病入山了當大事之不暇而暇作吟哦活計乎然俯仰身世自憫憫他又似有不容默默者隨意所到舉筆直書積而數之偶成百八蓋實不向吟哦中來倘得意忘言亦未必非了當大事之一助也乃不毀而漫存之一只此萬山中悠然意不同望江迷客路禮塔懷真風茅室我晏坐時復觀筠叢嬴來病後質安問窮與通二一自芒鞋破從教萬慮慵短衫堪度夏敝襖復經冬禪起餘長嘯談時僅短鋒晨昏伴幽寂崖上幾聲鐘三山舍陋無窗惟標離相幢交吞既非獨兩照亦非雙霞色燭短嶺月影凝長江為歎舉棹者胡為多釘樁四問豫何所事禪餘讀梵書寂默固無在葛藤奚待鋤俯仰聊自適賴此狂與疏香木日已燼何如長作樗五一病五百日形神並已枯緇素偶相值稱我為禪臞禪臞竟何解佛法從來無倦眠醒便起笑此空頭顱六我性耽枯寂愛此山中山珍禽曉破夢孤猿夜伴閒白雲時出沒流水亦潺湲得失永無慮有門常不關七我愛山中行安步不須馬有時訪怪石有時趨樹下本無取境心何勞更修捨嗤彼世塗中鑽龜復打瓦八我愛山中住觀化俯且仰一法不當情萬緣同鏡像才言獨露身無端已成兩笑破太虛空巖谷爭酬響九我愛山中坐一日兩日永頂雖鵲未巢樹亦枝無影既不耐喧譁亦不味幽靜形疲便起行枯樁變浮梗十我愛山中臥易寐還易醒醒寐惟幻形誰實司肯綮諦觀五陰身非別亦非並不知何所緣猶然不自肯十一我愛山中春雪埋古路塵幽蘭笑巖石遊子行且逡松色宛如舊鳥聲亦不新避秦嗤未久尚有羲皇人十二我愛山中夏心閒日逾暇茅屋足清涼何必登臺榭介爾華欲敷奚物堪酬價一片白雲飛雨似車輪下十三我愛山中秋微雲淡碧流桂少香倍烈菊瘦姿乃幽白粲早已熟寒蟬聲未收飯罷峰頭坐長江天外浮十四我愛山中冬密雲覆重重雪舞盡如蝶簷結宛似龍室內饒焦木門外無行蹤擁被鎮日坐不參五葉宗十五我愛山中風暮息朝復有寒時漫相疏熱時仍覺厚疏厚自隨情此君元不受欲知情性長問取池邊柳十六我愛山中花遍處呈佳錦草木雖殊質香色均成品清賞適相宜何堪供佩衽幽然傲深谷不伴時流飲十七我愛山中雪萬峰同一覽潔矣無片塵清哉有餘淡壓竹每成梁綴松多作菡何須蘇武吞豫亦將為糝十八我愛山中月寒光照深庵萬里絶雲霞一窗饒冷焰移來柏影長拂此幽人臉旨哉月喻經圓缺皆從漸十九我愛山中泉內湧非從邊淵淵離煩垢泠泠浸碧天煮糜信甘美烹茶亦奇鮮誰為知味者請問光音禪二十我愛山中石縱橫亂成格苔蘚作衣裳雲霓備冠舄不點生公頭寧畏提婆擲兀兀伴餘年笑我煙霞癖二十一我愛山中松行列亦橫縱數尺已似蓋盈拱還如龍奇根傍危石質臞姿乃丰嚴冬一夜雪遍體白芙蓉二十二我愛山中竹交影堪成屋風來奏梵音雨過抽新簇徑節出長林虛心符短牘雙徑不須開千畝藏幽谷二十三我愛山中晴日照幽溪明雲霧忽何去松篁乃菁菁長空鳥跡迥短嶺泉流清舒體一獨嘯深谷頻相賡二十四我愛山中雨鳥鵲同斂羽抱膝坐繩床寂爾無聞睹倦來舒腳眠倏忽經五鼓捫枕辨方隅手眼知非瞽二十五我愛山中雲幻作庭前供星散各為葩烏合還無縫乘來身較輕騰去天為重曠矣任翱翔誰共虛空訟二十六我愛山中日冬夏咸和適霜露釋然消幽室能生白浴溟此先知懸鼓還非隔正午打三更疑殺參玄客二十七白雲捲還舒清風拂還止問我山中樂從來只如此懶向蒲團求亦不鑽故紙若作佛法商千里復萬里二十八未知牝與牡安辨黃與驪冬來風颯颯春至草萋萋法本不相待徒勞似木雞遊子欲問道流水滿前溪二十九飲酒每嫌淡食肉秖喜肥嗟此惻隱性長閉嗜欲扉豈思蔬與水亦已堪療饑瞬息面目異何時復知歸三十好花明月下一杯仍一杯酣後長舒腳熟睡聲如雷恣言人世樂那信身如壞息斷知何去空令親屬哀三十一少年競脂粉窈窕思長娥秋波送深媚雲鬢開沉痾卮酒雅相贈舞罷還酣歌之死矢靡悔悲哉燈畔蛾三十二美人衣羅綺纖指彈琵琶音韻清且婉態度雲復霞仙尚失神足人誰不歎嗟寧知一線斷傀儡歸泥沙三十三逐興呼美酒舒懷撫瑤琴豈無暫時樂終為壞苦侵迷頭常認影歷劫從他尋何如撒兩手瀟灑出稠林三十四人將雞豕烹獄卒將人煮酬償無已時楚毒那堪侶何不修慈心民胞物吾與蔬水足資身二簋亦可祣客來饒菜根養親獻果茹有生皆愛命奚忍充豆俎君子遠庖廚掩耳盜鈴語三十五饋肉令人悅揮刀令人恐不從刀上來此肉何由捧食之信可甘思之寧不悚斯事尚心安何須咎作俑三十六淵明嗜杯酒不與蓮華盟折腰既弗屑麴糱胡偏酲欲深天機淺格言羡莊生性學豈多術無如理勝情三十七壯士血氣盛國步誇邯鄲殺人不敢睨一語盟肺肝義勇洵絶世仁慈體乃刓圖窮露匕首髑髏千古寒三十八草茂忽復萎月滿忽復虧少壯尚難保老大安可怡莫問死何去只今住者誰空華結空果拭目知未知三十九紅顏曾未幾倏忽斑兩毛爭趨愛欲焰積劫歸塵勞斯世竟何恃苦趣誠無號早悟不生滅嗤言王母桃四十拜將羡椎埋誰知身在蝸生來惟兩腳寧復須三鞋營營竟何益終就無常豺試看北邙土多是貪瞋骸四十一忉利一晝夜人間已百齡縱使滿百歲猶然朝菌形況復多夭折瞬息無安寧胡不一猛省甘為四大刑四十二玉兔甫西逝金烏復東升少壯日已去衰病時時增寐者終不覺智者思自懲欲使冰成水無令水結冰四十三梧桐一葉落天下同驚秋老少死無算見者胡悠悠眼前幾許樂貽卻千古愁早唱歸家曲莫待捐荒丘四十四狐兔營其窟烏鵲爭其巢孰知咸在旅生死均浮泡茫茫苦海闊欲度須繫匏莫使荒郊骨還令梵志敲四十五東鄰慶新婦西舍哭亡男哭者不復笑慶者終必惔悲歡亂衷曲擬北仍復南輸與煙霞客隨緣宿草庵四十六世法多崎嶇禁賂還存賄枉道或容身直道每招罪何如野衲閒薇蕨堪充餒風來翠竹鳴雲去青山在俯仰獨清寧家風常不改四十七賤夫登壟斷巢許棲高岡清濁固霄壤取捨同膏肓不知三界夢剜肉強作瘡一念悟無性十虛任徜徉四十八水氣每成虹地蒸每作菌介爾本無形剎那已有朕慎獨雖兢兢豈達無生忍一翳甫在睛空華斯亂殞欲令華相滅莫向空中泯四十九盛暑喜乘風嚴寒愛向火情性屢隨時究竟誰為我未出有無關空勞此靜坐莽蒼三返人撫腹猶稱果五十風來萬壑鳴月出千山皎笑此頑虛空常為明動擾不動復是誰豈居風月表離即既雙非問君了不了胡弗畏深坑徒憂打之繞驀直轉欹邪空爭內外紹五十一荊璞未應剖卞和徒自泣雷鳴二月春蠕動皆離蟄屈伸信有時何用勞汲汲築碎太虛空從古原無汁五十二畫餅不充饑美食不中飽欲縛樹頭風勤取龜毛絞弄假豈成真賣拙翻為巧俱盧日落山贍部雞鳴卯五十三聖訓恆諄諄令觀五盛蘊陽焰與空華無我誰欣忿生死靡暫停幻質同朝槿了知呼吸關至道斯云近五十四禦寒不䌟績糊口不耕田佛制固如此誰思共息肩神王翻貝葉形疲且穩眠何須學枯木失此無心禪五十五有嘲不用解有山不用買泉流月影長霧壓空形矮起臥任所適語默隨瀟灑拽杖登巖阿野鹿馴無駭五十六今夏稱酷暑此地偏清涼金風初到嶺木葉早已黃霜後菜味逸饑來食易良飯罷更何事加趺送夕陽五十七自昔違故國客路良迢迢回首信非遠縱步終難翹賴有舊時友舉手頻相招同行不肯返如何獨乘船五十八我去千里外朋來萬里中趨避各異旨臭味胡相同取捨信有極詣極思真風笑指南詢客悠悠路未終五十九非我漫傷今嗟時太不古律法如亂絲禪宗更莽鹵庶幾義學家猶然水添乳悠悠淨土門事理分捨取各披祖父甲翻傲負嵎虎哀哉復哀哉坐致魔軍侮六十枝葉秋已摧貞實冬無敗所以真僞關終莫逃爐鞴欲使稻梁肥殷勤先去稗折攝似分途同歸調伏戒六十一人侮非自侮自侮非侮人不受禮歸主妙喻真且親修羅慢幢折帝釋勝幡新忍為力中最勝敵寧揚塵六十二調心如大地寵辱何關意美玉良自珍角石翻成瘁遐哉睡虎機千古稱難企誰知歌利王鹿苑先蒙記六十三言居佛祖先行落凡愚後漫抱法門憂自疾耳無救恥躬愧儒宗歸爨慚禦冠莫誇日正長瞬息聞更漏六十四揠苗徒自損溝澮盈還涸九仞不及泉枉向高原鑿慎終亦謀始所厚那堪薄醍醐願共餐善巧先鑽酪六十五三十未始壯四十今已老徒爾費芒鞋依然不聞道既懲從井仁豈學手援嫂見彈求梟炙嗟哉計太早六十六壁影本非魑孩童疑作鬼白日忽升天見徹無頭尾秋深饒月華春到多芳卉根境未離籓受用能有幾六十七四衢遊坦坦白牛步緩緩已悟勝蓮時方知忍土短成壞等浮漚依住均纍卵啾啾器內蚊誰信斯非誕六十八牛犢不畏虎傷鳥怖虛弓安畏雖異局對境皆懵懵何如見諦士了了知無忡遊戲逆順界寧尸勝敵功六十九避世不擇地避地不擇人烏江已非漢桃源亦屬秦所以明哲士沒蹤莫藏身欲知剎海性從來惟一塵七十鵲噪固無憂鴉鳴亦報喜聲性本非殊聞機寧異耳一耳聽兩音兩亡一便止無明從此無始覺從此始七十一咸臨吉乃利倚伏洵多義甫唱拔茅歌旋生朋黨祟世事固應然調心尤不易難提起四禪魔女偏相魅七十二蹇不利東北解亦利西南安身乃崇德憧憧奚所堪鴻飛麗天表龍躍歸深潭思慮泯無朕白日眠方酣七十三居德忌成夬育德貴如蒙大道曠無際何以耳似充出關驚枕夢入場嗤老翁熟讀霍光傳方知養正功七十四亢龍成碩果無悔須歸潛形氣尚應爾況復心法嚴洗心貴藏密豈兆涼與炎滴油莫墮地凜凜刃方銛七十五逐妄又尋真揚灰復鼓塵未悟賓中主安知主裏賓美食飽所棄糟糠饑所珍滔滔天下是沮溺同迷津七十六希顏復學孔未出三界籠步老復趨莊依然舊漆桶太極未生形自心早妄動石火電光機何勞誇一統七十七既慚德不修又愧學不講德學本同條誰能作兩項紫陽與象山各喫三十棒識取宣尼宗方來證溝港七十八童冠沂水遊三子異其撰一哂一喟然黑豆換卻眼央掘發誠言胎難安然産讀至不動章大慧顏當赧七十九前際不可窮後際不可極現前介爾心邊際渺難測明明法界宗妙觀胡墨墨奮起金剛拳打碎無生國八十欲雪先集霰欲雷先耀電如何欲成佛福慧毫無片流小石能穿鑽息火誰現須教熟處生擐甲同鏖戰八十一星火燎荒原一指蔽山嶽易訓誡履霜宣尼貴先覺未窮學地流慎勿誇無學泥在水非純稍動還成濁八十二濁水珠可清暗室燈能破惟有靛池公獅吼終驚臥跨下亦登壇大將非從貨悅草披虎皮徒令千古唾八十三狡狐能惑虎木雞難怖禽可欺不可罔神全乃莫侵面南看北斗端的誰知音曾經勝熱焰徹體涼且愔八十四崑崙非宿海宿海非阿耨滔滔萬里流一滴源誰透漫傳天上來錯認銀河胄賴此投海機從前皆免究八十五六塵本太平六根亦非嬈問取六識身蹤跡尤杳杳誰為結使源細覓終難了試看瓶內空傾出知多少八十六色色彰苦空聲聲演無我拈來法界鑰開盡塵沙鎖睹角便知牛望煙豈惑火若要船頭直端卻船梢舵八十七須彌怪石供海水塗足油陶輪擲千界剎網收雙眸變身四萬二入聖終未優擬作神通會新添頭上頭八十八鯤潛知海闊鵬徙知天高十虛信寥廓何如遍吉毛縱步歷塵劫徒令童子勞迷此一隙理今古同滔滔八十九金屑不著眼毒器不貯漿王饌未敢食華屋徒窺牆垢盡明自現胡勞羡色莊春風一夜起蘭蕊遍溪香九十芒鞋棄屋後鉢袋掛茅菴非敢濫無學坐訪同行參石蜜味中最食乃知其甘見月良賴指寧復撈深潭九十一力疾復談經非甘背夙盟應憐慧命斷誰顧色身竛字字杵嬰血言言佛祖型寄規龍象衆莫作等閒聽九十二語不競朝華病應消夙業獨愧衰朽身難企尊者脅法無心外傳道自威音劫明明梵網燈未審誰先接九十三直指西來意楞伽心可安語言同解脫內守偏蹣跚休戀聲前句還思步外竿不嘗天下醋那信一般酸九十四霧行不覺潤日照咸知暄獨憐之楚客往往北其轅珠固在濁水蓮豈出高原為問南詢者詎曰甘勞煩九十五學士畏枯寂禪德怖繁文繁文信無益枯寂亦添瘽蛇繩見方熾取捨徒紛紜捉鼻謾高喚燈照知非豶九十六未明心與性讀誦徒喃喃甫欲思上達暗證還自緘不解順流棹豈知逆風帆呷盡四海水到頭滋味鹹九十七競為格外鋒罔念昔時典因護乃至吠堪嗟梵志大財慳尚可回法執誰能遣五百野狐身覆轍偏爭踐九十八佛語即佛心佛心非佛語離此即非關究竟誰為汝一句了然超萬劫合頭杵若要舌本甜勤取黃連茹九十九心肝掛樹杪此理從來少離教覓單傳癡鱉何時了妙指發妙音非內亦非表側耳不會心依然打之繞一百觀箭毒逾熾問橋路逾遲路遲日易暮毒熾那堪醫有藥不早服有足不早馳茫茫生滅海誰與定歸期百一毒蛇勿捉尾甘露勿添水添水飲成病捉尾螫人死執項善調御功歸豢龍氏悟時轉法華良哉惠能旨百二聽法不觀心死至成狼狽觀心不聽法執刀還自害未知說默源同條卻異會鼻孔向下垂空讚威音外百三長語悟非多雪填井便無要言迷不少小毒還生愈何勞妄欣厭共把真宗誣早修開演智莫畫舊葫蘆百四執藥每成病借病翻成藥通塞靡定蹤觸境須深度知人勿昭昭自照無莫莫一言燭根元千山勝行腳百五聚螢不爇草聚雪不成山鑽紙信無益枯坐終癡頑未歷羊腸險安知行路難千里始初步休商最後關百六洪鐘叩乃鳴美玉終須琢不覓惡鉗錘豈破無明殼護茲煩惱情忍使靈光剝幽幽長夜寒熟睡誰能覺百七烏焉忽成馬展轉無非錯佛滅曾幾時哀哉水潦鶴矧茲最後年何地尋略彴斯文賴未亡共聽封人鐸百八日輪挽作鏡海水挹作盆照我忠義膽浴我法臣魂九死心不悔塵劫願猶存為檄虛空界何人共此䑳幻寓華嚴菴四偈笑破無生夢拋開有識身隨緣聊寄足何事可關神瓔粥偏宜病鶉衣不厭貧灌園慚計拙莫復更思蓴九子峰偏靜非干車馬喧有菴藏竹徑無客到松垣地是金沙布天從螺髻援加趺消永晝欲辨已忘言未具摶風翼欣同維鵲巢秕糠能作飯野菜亦成肴泉飲方知冷情枯始可交半生慚孟浪今復愛吾犛千里歸盟主寧辭風雨侵緬懷恆尚古扼腕每悲今野獸夜警寐山禽曉奏音苦空須早悟無負最初心遣病歌九華峰頭雲霧濃三月四月如隆冬敝袍厚擁供高臥尚嫌暖性來無從九華山中泉味逸百滾千沸甘同蜜拾取松毬鎮日煨權作參苓療我疾堪嗟我疾療偏難阿難隔日我三日寒殺闍梨熱亦然已信浮生危脆質豈從旦暮戀空華悲我知門未詣室是以勤將神咒持擬開同體妙三慈我病愈時生界愈剎那非速劫非遲箇中消息誰當辨痛癢相關漫自欺夢徹公有感為持咒偈十載彌天網心心獲異禽蟭螟偏誤入五夏漫投針一簣功猶缺他緣早受侵神交雖不隔托足已殊林百里半九十悠悠關我襟支頤頻到夢寤想倍憂深黽勉皈明咒終期聽好音力追先哲道莫陷近時燖三十八歲生日偈有序五月初三日豫自分三十八歲必死扶病勉強入山不欲留此骨於人間世也山中與我同生者三人皆於春夏之交逝矣豫猶延殘喘得至今日實三寶及神咒力耳爰成一偈以感佛恩誤受五行質恆為四大侵庚從丙火鑠計使月光陰拼作山中骨寧存塵世心獨霑神咒力偏渡業河深已悟無常浪重聆實相音菩提須永發正法誓長今豈視魔軍擾甘令佛道沈有所慰君不見帝釋五衰相已現甫唱三皈貌更姝又不見趙州苦行山中足螣蛇變作龍戲珠從來逆境多成就歎息幾人能自孚動心忍性誠實語自暴自棄非良圖夏草茸茸霜所敗松柏亭亭冬不殊寒威適足堅我骨冰雪還堪養我株老虯千載稱神樹豈向春風競賞娛大任舍豫誰克荷精金須煉終非誣試看山前行路者崎嶇歷盡是通衢病餘寫懷四偈一條拄杖兩芒鞋海闊天空舒我骸愛見慈悲終作疾婆和學侶謾為儕悅心有法聊成賞糊口無糧卻是齊好惡雲山隨意歷莫商何地把身埋昔日曾吟五子歌典刑依舊憶熙河宗庭獨力除荒草教律誰能共執柯雨露重時恩念少鉗錘辣處怨情多堪嗟大願無方便還向金錍自切磋勝心雖發足凡情十載依稀舊路行疵露任從人世撥心虛惟念斷金盟莊生有斧嫌無質旭子徒存垔孰乎笑殺巴人猶少和引商刻羽欲誰賡大小由來出路岐無端埋沒好男兒花香暗被狂風泄果嫩偏遭淫雨漓收拾敗棋輸已半搜羅剩騎氣方贏三年嘗膽嗤非久須學華嚴塵劫思重閲大藏偈我年三十歲閲藏求殊琛身心並安適志欲老叢林無端被名纍善友牽我襟雖受切磋益酬酢時相臨實德愧無寸虛膺人世欽夙障得其便惡疾斯來侵悠悠旦復暮遷延乃至今賴此病良藥入山恐不深棲止寧擇木怖曲同傷禽乘時理舊業隨緣且自針已識浮生夢何勞謀釜鬵為哀盲道者恆復長呻吟法藥須療病豈曰甘為蟫鍊酥能作酒當令猛光歆魔外固多巧誰堪七縱擒勉旃莫辭誕法雨將咸淋有感偶成他人之惡不可助助惡猶如投火聚他人善事不可阻阻善猶如違害鬼遏惡揚善順天休罪滅福長不須求以善資善喻水流終歸大海涵千洲以惡資惡喻積糞徹底臭穢終難近糞穢猶令田稻肥惡業徒招地獄悲喜病口占病作丸湯經作醫苦空無我適相宜一倫生死無生滅痛殺闍梨知未知題五叉松昔時五叉化作龍今時五叉還成叢昔時大士孤峰坐今時大士盈山中五叉本自大士種撫茲道樹知慈風歲寒不改青山色雪綴依稀帝釋宮帝釋宮中曾現瑞百千身相同名字願力塵沙未足奇誰信泥犁無礙事法身輪轉水為冰性惡昭然性善義迷悟關頭一念融刀山劍樹隨遊戲笑指庭前柏樹參那知此樹西來意贈見心開士偈有小引見心開士為九華尊宿喜營福事非一日矣神廟時所頒大藏久未供奉開士復捐衣鉢之餘為櫥供之豫因閲藏以偈贊曰諸佛慧命常住法身云何不滅三藏是珍因指見月月見指親文字觀照實相同真一展一誦為梁為津維我開士信此妙因如法供養有敘有倫護彼侵蝕卷帙常新便彼簡閲次第攸陳悟性永發功由爾遵緇林之導法王之臣何以報德劫外長春丁丑季冬禮千佛於九華藏樓偈贈諸友謾云苦瓠換甜瓜應信慈尊並我家念性不勞參水月低頭已駕白牛車介爾靈明絶古今摩尼豈被汩流侵珠澄濁水清光露映徹晴空萬像森堆山積嶽盡塵埃力把慈風一夕摧吹散鐵圍無暗地何須拭目問明來昔年窠臼一時掀臘盡春回日已暄欲信崑崙泉脈動但看河凍不勝轅歲月如流不可期強將識性試旋思三千鼻孔終無異一樣鬚眉那自疑靈犀一點性元通觸境逢渠道自融驀地舉時聲歷歷相看同在寶樓中芥翳非關眼性明空華飄舞孰枯榮道場當處無成毀記取當年常不輕一體橫分想與情冷然性計即無生功成五悔非留惑莫替樓頭最後盟贈頂瞿師掩關念佛一句彌陀聲歷歷自他共離不可覓是心作佛是心是熾然感應真空寂驀直歸來莫問津無明睡裏轟霹靂醒來捫枕笑呵呵夢墮大河誰實溺夢時非墮醒非超一任凱風同奏績髻珠解處紹功成內外空爭庶與嫡權實由來不二門白牛背上橫吹笛一曲無生明月寒從來不用降魔檄因拄杖折聯成舊句久將北斗面南看回首家鄉月影寒拄杖折時手眼瞥芒鞋破處足心酸不勞藏跡針鋒裏偏解拋毬急水灘一嘯忽傳林谷響石人撫掌白雲端夢感正法衰替痛哭而醒述偈寫懷二首幾番視聽悚狼威脂欲消時肉漸肥自許肝腸終莫改那堪聲氣合仍違魔軍邪幟三洲遍孽子孤忠一線徵夢斷金河情未盡醒來猶自淚沾衣休言三界盡生盲珠繫貧衣性自明肯放眼前閒活計使堪劫外獨稱英不龜手藥猶分明無上尸羅寧隔程泣訴莫嫌頻入寐會須踐我最初盟道過齊雲問訊貞武煙霞賸癖此中分遙望名巒勢欲棼擬向玉屏占瑞氣還從金鼎挹香芬千尋曲澗鳴流水萬朵青山綴白雲豫亦佛門為外護何妨破格友真君四十初度寫懷物論悠悠理本齊年來漸覺脫筌蹄拳開非實掌元在翳去惟空眼不迷流水有心終匯海落花無語亦成溪剎那生處生何性笑把威音劫外提雨窗選佛分得東文二韻何須翹首福城東十界圓歸一席中衆壑爭鳴同就海簷聲滴斷熟梅風擬將遊戲覲迦文卻喜空山布法雲輪相轉時知性起歡呼早已震魔軍喜雨歌初夏久暘暘人情爭畏旱芒種雨如傾溝澮咸充滿一澍十晝夜溪流抑何悍我坐陽山第一峰禪衣擁膝偏稱暖倦來無事且經行選佛場中欣有伴焚香煮茗樂悠悠雨點風聲片語收風吹不入雨不濕堪笑從來學未優三身四土都黴卻翠竹青松雲外浮君不見隨他一語千山走今日重添頭上頭贈葆一兄新安諸峰多淡雅陽山獨自稱秀拔悠然小閣築松間倚欄坐眺襟期豁城市紛紛聲不侵萬山點綴浮雲闊鳥語蛙談了義詮磬魚梵唄閒生活我來結夏信奇緣坐向塵中剖大千葆公夙志亦非小衣珠欲向迷前曉梵世絲垂擬就針風師珍重莫相侵佇看投契無蹤跡繡出鴛鴦絶古今絶古今微塵國裏足知音目前雞肋何須戀攜手同歸解脫林寄懷未能文字離微影不留玄機欲唱孰相酬因憐屢中神猶隔翻憶如愚益可收九子峰頭標月指千如境裏辨金鑰靈犀通處知無朕莫負持明助遠猷新秋懷如是師林低鳥跡迥石密竹影臞白雲填萬壑殘月掛斜株嗟此不成寐我友天一隅敦好信非久時復懷嘻吁警衆友翹首菩提路悠悠幾陌阡應憐小證後重憶大通前月指謝緑影鏡像明媸妍自慚說法鳥誡爾莫生天題扇寄懷野愚索印章天都列千嶂遠望積平郊松陰拂危石幽然築小茅無事此靜坐日影移林梢慚豫天外友攜杖徒神交翹望別峰外矯矯白鶴巢短吟聊寄興新句未堪敲借靈思妙腕解此半生嘲贈華林開士九旬結夏陽山峰松陰竹翠隨俯仰坐談喜有二三英斂目還勤九華想九華山頭有老僧心慈體厚神爽朗言笑春風遍席生靈根堪作蓮盟長海陽三百路悠悠日出扶桑一影收識浪息時心水湛願風鼓處行雲稠悲緣有種惟應拓惑業無根任意抽片語神交聊寄贈努力追蹤脅比丘別玄覽雨歇松林濕未收寒蟬怯露聲如抽九旬同住忽云別孤懷不語偏悠悠丈夫慷慨重一諾片言矢志須千秋白雲出沒竟何性碧空青皎光沈浮智士從大不從小愚夫近慮無遠憂皮囊愛惜終捐棄虛名赫奕奚能留何如曠覽寰區表高登闊步遵玄猷簷風吹醒循階夢彈指先參慈氏樓君不見菁菁夏草今如許翠柏霜殘葉不柔附對聯地藏塔前對聯帶果行因一顆慧珠光燦爛照泥沙即是究竟寂光祕大現小六環行錫響琳琅喚昏蒙當體真常大覺化城大殿對聯石壁雲窩非世界非微塵托幻表真由大願心地性藏即化城即寶所開權顯實在當人法堂對聯古佛垂慈六度四弘同會極新羅示跡一花九葉別傳燈三門對聯和尚石一音說法芙蓉峰六時獻花
