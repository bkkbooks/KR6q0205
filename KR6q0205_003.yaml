body:
  text: 蕅益道人智旭著門人圓果録序梵網合注序大哉梵網經心地品之為教也指點真性淵源確示妙修終始戒與乘而並急頓與漸而同收約本跡則橫豎俱開兼華嚴法華之奧旨約觀行則事理俱備攬五時八教之大綱文雖僅傳一品義實統貫全經緬惟智者大師之時人根尚利故既廣宣教觀法門乃僅疏此下卷戒法而大師精諳律宗文約義廣點示當年之明律者則易開悟今時之昧律者則難千有餘年久成祕典我蓮池和尚始從而為之發隱此其救時苦心誠為不可思議特以專弘淨土律學稍疏故於義疏仍多闕疑之處又下卷雖獲流通而上卷猶未開闡嗚呼四依大士於法豈有吝心直是衆生緣薄罕能遘於希有法門耳智旭幼崇理學即以千古聖賢道脈為己任但恨障深慧劣往往執東魯而謗西乾後因聞自知録序并閲良知寂感之談始發信心嗣又聞地藏本願并聽大佛頂經猛圖出世於是矢志參禪逃家行腳雖亦數發悟解奈何剋證無期賴有一點慚愧正因斷不敢錯下承當生增上慢以蹈邇來大妄語之覆轍爰念宿因力薄應須兼戒兼教以自熏修先從闍梨古德法師遵學戒之法於蓮老遺規次探法華玄義摩訶止觀等書私淑台家教觀而毗尼一藏細閲三番梵網一經奉為日課遂於發隱所闕之疑渙然冰釋即上卷文古義幽昔人所稱不能句讀者亦復妙旨泠然現前因擬一為合注以補前人之缺而此志雖發緣障多端六七年來悠悠未遂客歲藉大病為良藥方遂入山本志適如是昉公遠從閩地攜杖來尋為其令師肖滿全公請講此經以資冥福復有二三同志歡喜樂聞豫由是力疾敷演不覺心華開發義泉沸湧急秉筆而隨記之共成玄義一卷合注七卷注既成敘厥本末以告來哲蓋雖不敢謂凡夫心力實能超越前賢而夙有微因今復久誦半生淹洽自不無千慮之一得故於理觀事相不惜一一指陳誠可勷開解篤行者之半臂也後之覽者尚勿以繁瑣而厭忽之俟解行雙圓乃歸諸筏喻可耳讚禮地藏菩薩懺願儀後序嗚呼大法久湮人多謬解執大謗小舉世皆然寧知地獄衆苦已隨其後瘖啞餘報復更難窮故我地藏慈尊於大集會中現聲聞相而世尊廣歎勝德且為之較量云假使有人於彌勒妙吉祥并觀自在普賢之類殑伽沙等大菩薩所於百劫中至心歸依稱念禮供求諸所願不如有人於一食頃歸依稱念禮供地藏以菩薩久修堅固大願大悲勇猛精進過諸菩薩故也蓋末世之中駕言於大乘甚易而躬行於僧行實難寧知廢小談大并其大而亦非悟大用小并其小而亦大故法華誡弘經者必依四安樂行涅槃極談常住佛性尤扶戒律今大士之功德獨盛得非亦在此乎智旭深恨夙生惡習少年力詆三寶造無間罪賴善根未殞得聞本願尊經知有出世大孝乃轉邪見而生正信仍以謗法餘業雖辛勤修證不登法忍每一展讀大士三經輒不禁涕泗橫流悲昔日之無知感大士之拯拔也因念濁智流轉之日與我同此過者不少敬宗十輪并本願占察二典述此儀法庶幾共滌先愆剋求後果不終為無依行乎未登無生正位皆可修之無論初心與久學也安居止觀山房序海陽西郊有最高峰名陽山尖峰側有阿蘭若名止觀山房九華葆一初公之所構也茂林修竹疊嶂層巒雲霞變幻于足端視聽擴徹于天際豫將訪友閩中過而樂之且以時逼炎暑征途不易遂從初公之命借此結後安居日永境閒蕭然無事二三同志喜究大佛頂經要旨因作九旬商確商至第四卷云我說佛法從因緣生非取世間和合粗相頓悟法華經中佛法從緣之旨嗟乎二經妙指何其巧出一轍也是故智者大師證法華三昧乃攬本跡十妙圓歸于介爾一心示摩訶止觀法門與今經所明妙奢摩他三摩禪那若合符節後之箋釋斯典者無慮數十百家苟欲捨摩訶止觀而別立宗途未免轉趣轉遠良以摩訶止觀的是如來大事因緣的非世間和合粗相故也請嘗言之性覺妙明本覺明妙寂而常照照而常寂豈非止觀不二之真源乎迷此真源則寂體成昏照體成散是不變之性隨染緣而成九界悟此昏散則散既本寂昏亦本照是謂不變之性隨淨緣而成佛界雖成佛界真源不增雖成九界真源無減是謂隨緣之理歷染淨而終不變夫隨緣即不變大事之因也不變即隨緣大事之緣也故曰如來發明世出世法知其本因隨所緣出知此義者方知心佛衆生三無差別亦知六而常即修非性外即而常六性不廢修修非性外不墮因緣性不廢修不墮自然世有徒聞止觀之名罔窺厥旨者妄謂但屬修成豈識性修不二真旨趣耶豫在俗時創聞地藏本願而發出世之心嗣聽此經而為剃染之舉歷年行腳取益無方於此二經蓋不曾掛一字腳實又不曾離卻一字後讀台宗教觀每每引占察經以為誠證而占察經即地藏大士所說妙法也其開示一實境界則是一大事因其開示二種觀道則是一大事緣愈信如來密因菩薩萬行一門超出無二無三之旨誠不我欺每思拈此妙義點示未聞客歲于九子別峰創講一過今乃重拈妙義於是隨其根性各獲法喜噫嘻此雖偶緣豈偶緣哉倘吾與諸友不同具此一大事因則法性了不相關倘吾與諸友不久種此一大事緣則說聽豈能投契況此山房既已先稱止觀而初公法派復是九子傳來當知于此大事夙緣非淺從此種而熟熟而脫莫如鈍根聲聞于中悉忘他年更作貧兒馳逐也嗟乎智者大師聞此大佛頂經名字向西遙禮一十八年不獲睹見後百餘年而般剌密諦剖膊傳來復更淹留多載始漸流通觀此二大士苦心豈欲為尋行數墨者添葛藤哉必須教觀齊彰因指見月由斯典而通乎止觀還由止觀而徹信吾言不誣則九旬結夏真堪為塵劫緣因矣更拈一頌以裨妙觀頌曰頂光化佛全彰性妙觀天成不借功未歇狂心頭亦在已瞻華屋戶寧窮密因徹悟無生滅萬行方知究竟同魔外升沉目去翳菩提真路鳥翔空題跋合注跋語夫本源心地含生共有無染性戒日用不知目翳而華舞太空夢蟻而尋羶階下晴虛之體依然輪王之身如故哀哉妄惑枉受幻輪勞我慈尊現身同患示成不倦於八千垂化無偏於塵剎一滴之心地既敷積劫之沉迷立醒而琅函久錮半珠僅呈繄我愚蒙得探全寶竭思殫機塵培泰嶽思法緣之匪易輒涕泗以滂沱願我同仁深思力學解行同遵自他俱利庶得上報佛恩不負己性矣題畫華林開士性癖山水六十初度高足葆公圓山水以壽之群峰列秀空亭寂然見道不見山也見山不見人也或曰掌亭人得無入隱身三昧耶豫曰此正入普現色身三昧耳東坡不云乎溪聲盡是廣長舌山色無非清淨身雖然此猶是門外語且道如何是門內語見山依舊山見水依舊水若向這裏會得親切便可向開士祝無量壽矣題等韻光音以上覺觀永離不復以音聲為教體世界初成梵天再立始共呼為薩埵薩埵此語言文字之始也風土既殊以字代音而梵韻不可復考矣後之賢哲創為三十六母以辨五音至今相沿習學又成故套試研問久學尚未委其源流他何足云嗟嗟文字性空緣生故有一音一字咸即法界所以衆藝童子唱字母時一一無非般若波羅蜜門而今於因緣所生法中尚未知其端的況能知此音性字性皆悉即空即假即中頓成三般若耶雖然法無迷悟迷悟在人觀照為實相之門文字又為觀照之門則此一帙未始非諸佛智母縱令習而不察如貧女寶藏雖未受用不可謂無況今書者讀者又孰非善財眷屬哉刻般若照真論跋夫般若無名一切法皆般若之別名也一切法無體般若即一切法之自體也一切法不可名故般若亦不可名般若無別體故一切法咸無別體世有欲借語言而顯般若欲絶語言而顯般若者皆未達甚深般若圓融三德者也何謂圓融三德一實相般若二觀照般若三文字般若此三非三亦非定一以一切皆實相一切皆觀照一切皆文字故是故六百卷全帙而非多二百六十餘言而非少乃至後賢述作無慮數十百家了得即字字解粘去縛不了則字字加縛增粘澄公照真論亦其一也此論自北而南流通已久惟新安尚乏聞熏賴普門安尊宿攜入黃海而積如厚禪師旋為繡梓觀二老苦心直欲令見聞隨喜者當下即與甚深般若相應豈可更作借言絶言兩法會哉若于此論不作借言絶言會則于六百卷經于一大藏教亦不作借言絶言會譬如一星之火遍燒原野豫拭目俟之矣血書法華經跋夫一切佛語皆群靈之眼目千聖之慧命也況無上妙法乎一切讀誦受持皆般若之真因渡苦之寶筏也況刺血為墨乎而掠虛禪者惟事高談名理罔知真實行門吾以為彼直未悟理耳設真悟理則一切行門無非妙理有何事相可薄理性可尊況衆生無始我執恆重若宗若教對治咸急正宜借此微因充而至于三祇大行俾正使習氣與舌端皮肉一齊破盡可謂即事而理即漸而頓奈何棄此真實功德而以空談當妙悟哉惟乳生法友夙植正信年方應法遂作此不思議功德是故歷參知識不染近時禪病今又將篤志教觀深入斯經堂奧夫非因真果正形直影端之一驗耶將來親見靈山一會儼然未散紹智者大師真正法脈方知一點一畫無非全體法華三昧決不誤認無相安樂行猶在有相安樂行之外也請即以吾言為券書柬復水部胡善住病臥山中忽接手教愛我切而規我深自非金粟後身不能說此希有法也入正位人尚應泣聲震動大千況我大心凡夫其能漠然於衷耶但自利利他事亦須知彼知己知時知勢貧衲每每自反世謂我持律第一實增慚懼姑無論三聚十支八萬微細即比丘一百五十戒相雖於開遮持犯之致了了分明而未能行其萬一又無論遮罪中除飲酒過午二條餘皆未淨即性罪七支能免故殺而不能防誤殺能不錯因果不敢以三寶物私自取用而不能磚錢決不買瓦猶如古人能執身不犯世間男女而不能夢寐清淨能不作妄語兩舌而不能無惡口綺語良由多劫以來乘急戒緩習以成性遂大段著力不得是以恥躬不逮今已退居沙彌位中萬萬更無弘戒之理也惟宗乘中事未出家時先已留心苦參十載頗辨真僞而當世禪流反以我為夾雜教律橫生邪慢次則教觀一途叨仗夙因頗窺堂奧而近時學士復以我為未歷講席自設町畦捨此二法更欲以何法度人總之時未到勢未乘惟有山中苦行以消夙業正欲養成毛羽庶望高飛待佛法現前用副梵王勸請非敢固為石隱置元元於度外也一夏病劇秋來稍痊但瘧症如故須聽其自止非藥餌可制初入山時於地藏肉身塔前拈得先閲藏鬮今聊以法喜資神似較參苓倍勝山中淡泊冬衣典盡蒙賜路資本不宜領以寒威將逼遂用贖之亦足見因果不甚分明戒律疏緩之一端矣遙向丈室懺悔非敢言謝也病筆草復不莊不次諒之復韓蓮洲曩在吳城養病兩月備蒙仁者暨一切緇素善友道愛殷勤詎忍忘之特以出家本志分毫未酬濫膺人世虛名實深慚悚不得不避跡深山再事苦修圖得一當以報知己耳不謂夙業所追無地可避一夏病苦空消天日猶仗地藏弘慈得以不死今且閲藏作著述資糧倘幸未填壑冀滿梵網占察二願蒙論天池華山之間雖亦甚妙總以人情太熟取靜為難故悉達大士尚須遠居雪山況我凡夫豈容戀戀故鄉耶經云自未調伏欲調伏他人自未度脫欲令他度脫無有是處不肖正為深念父母之邦廣及法界有情乃誓于山中修道以濟度之非敢急於自度也夙願所牽致違尊命罪何可言然仁者善能設身處地當不深咎耳賤恙雖未愈大約得過十一月後或有生機日下計星守命未免受其侵蝕總之道力羸弱故使五行有權思之可悲言之可愧附去幻寓華嚴四偈博笑餘惟為法為衆生善巧調攝至囑至囑復卓左車病臥深山尊使晚到強起呼燈捧讀尊翰道愛殷切溢於言表兼以尊使暨北溟禪人極道盛意不啻口出銘之五內但貧衲此番入山雖非究竟作石隱計而痛念大法傾頽綿力難救姑作數年苦行以俟人定勝天耳承謬舉於宗伯葉公謂為宗說俱通解行雙到試自思之實增慚愧倘以古人之俱通雙到相此未免蹴然倘以今時之俱通雙到見稱又未免𧠤然矣每憶出家本志似不在釋迦之下數年被道友所牽致令虛名盛而實行微多方作入山計今始半遂正欲深之又深能為居士一人頓改節耶且秋間徹因持胡善住柬來悲愴懇切堪為墮淚而貧衲亦竟付諸漠然今忽應居士命則胡公其謂我何專此附復統祈慈亮葉公篤信斯道適膺宗伯之任靈山親囑克副無疑企羡企羡但山野病夫不敢浪通名字敬以原柬奉繳復陳旻昭法門之衰如大廈將傾非一木所支故數年以來惟恃道友為命脈而衆生習氣各有偏重亦復不能如水乳合興言及此惟有血淚橫流而已利名兩關從來羈絆我不得非適今也乃極相知人猶然以名利見疑所以誓朽此骨於深山不甘受千古誣謗耳居常謂壞法門者皆由於撐法門人如齊桓晉文尊周適所以壞周方痛懲之不暇奚忍蹈其覆轍獨有出家一點初志急欲剋獲聖果而悠悠十五六年竟成虛度慚天愧地夫復何言即此十五六年行腳打破面皮放捨身命僅開得名字即佛位中一隻清淨肉眼於佛菩提了了得知歸家道路明如指掌而形枯氣索前進為難意欲傳得一人勿令最後佛種從我而斷亦竟未遇其人嗚呼痛心又惟有夢寐永泣而已慧公來伏讀手教兼承厚施愧不能消然訊知居士近況所處頗艱而道念益固深以為慰或我佛遺法將來不至永墜尚有否極泰來之機其終藉手於居士乎每觀種種邪外之流其智甚短其說甚陋猶足以簧鼓天下後世有述者大底別有一段徹底精神以持之耳況將徹底精神持此至妙至深正法豈反不能弘於天下垂於千古倘不能弘不能垂只是我輩精神未曾徹底但當自反自勵不必他求也船子身葬水中而夾山乃大弘其道荊溪以居士身參學多載後方出家一世不登法座而其書乃傳之萬世不可磨滅宣聖之木鐸孟軻之好辨皆此類也此意願與居士共之雖未獲一第亦奚足憂當勤心道業誓續佛祖慧命為急務耳如是師帶病遠來期共作山中朽骨不意寺內三喪相繼未免內顧之憂勉強勸其一歸了世間幻局賴有此人差慰鄙懷但身亦多病竟未知誰死誰手也山居百八偈附呈清覽又附戒消災經略釋一卷知居士必能得意於語言文字之外其餘著述未能一一持上統俟後緣賤恙仗庇僅痊但久病之餘非復向日精力一息尚存惟以著述念佛為務俟金蓮現前便長揖西馳矣復智龍逃名於萬死之後已悔其遲傳法於一隙之天倍見其拙然生平受用惟是多虛不如少實一語庶不致以身謗三寶耳故退戒一事雖痛心於歸師之負盟亦以為今比丘則有餘為古沙彌則不足寧捨有餘以企不足也來翰謂法門中事大可痛心誠然誠然但非時食戒遂因將就上下相安而毀之將就二字是獅象家風是狐兔習氣耶語云躬自厚而薄責於人則遠怨矣其身正不令而行有諸己而後求諸人無諸己而後非諸人觀足下舉動未出常流徒欲漫增感慨恐傍人之感慨足下者亦不鮮也詩云具曰豫聖誰知鳥之雌雄孟子曰以燕伐燕何為勸之不肖於足下亦然自此以往更當學莊生之不庭耳寄徐雨海幻住一別音信杳然令人懸念無已世道愈惡病障日增遂於丙子初春作長往之舉埋名易字暫寓九華以養沉痾不意如是師乃於臘月初八夜忽從天降大驚大喜未及作禮便問雨海安在如師沉吟未答連問至三方述居士的信甚為悲切亦甚為慶幸以居士生長富貴從不知世間些小苦事況受此大苦故應悲切以居士雄才大略膽識高曠負蓋世之資具千古之學懷聰明慢眼空天下世出世法粗心浮氣未入甚微細智法門自非此等惡辣鉗錘何由得入聖賢閫域佛祖堂奧子輿氏曰天之將降大任必先苦其心志乃至行拂亂其所為此實可慶可幸但於動心忍性四字不妨十思百思遒圜中第一法藥也向曾深誡居士不宜輕舉妄動不聽芻蕘致有斯患然惺師每言因錯得妙跌法從他得今於此局益驗不誣乾之上九曰亢龍有悔而不食之碩果轉為不遠之復復之象辭曰至日閉關商旅不行后不省方即是潛龍勿用之意盈虛消息通於至道於通起塞即塞成通台觀所以貴善識也如是師正擬與貧衲同隱九華作潛修著述計不意滿公演子既已西馳直院湛公亦復長逝還一乃遣晦文遠來哭請似不得不作歸局貧衲亦萬萬欲與同行奈此間尚有小事未完須一完卻徑至泉南閉關靜坐俟居士難星退舍把臂於蓮寺戒壇前也自臘月初八聞信每日為居士持大悲咒七遍以脫難為期愧凡夫乏神通力聊盡此心而已萬祈為道自愛自勉種種闊懷非筆所罄再復陳旻昭聖祥歸又荷厚供兼讀手札稔知大願大悲真可謂不忘靈山親囑銘企何已但不肖以病廢之餘勉為二三同志作村學究訓蒙勾當何敢濫膺弘法之名而長干大道場地既有賢主人復有大護法自必有福慧並隆巧逗時機者出而應之豈不肖秦時鍍櫟鑽所宜居此位哉古人云改弦易轍不如就路還家如不肖者正宜幽至究竟如居士者正宜鬧至究竟鬧至究竟鬧即是幽幽至究竟幽即是鬧長干九子不隔微塵居士久悟斯旨何猶示同未悟耶梵網合注仗庇幸已閣筆共計十萬餘言未遑録上先以緣起呈正壇中十問性學開蒙二友合傳并塵清覽嚴冬在邇伏惟為道為生珍攝不在言又寄陳旻昭山中寂寞屢蒙厚施為謝但愧涼德不能消受耳每念大法垂秋亂臣賊子遍滿天下邇年勢雖稍衰而正法受其剝蝕元氣殊覺難復似未可欲速也貧衲以孤孽之身漫抱嬰杵之任而所交碩友仍多內變是以感傷切髓聊附虞仲夷逸之科遣茲餘喘冀早生安養然後乘本願輪還來度生縱令未填溝壑不終石隱亦斷無即遊王舍大城之事萬祈慈諒勿致徒費往還重招妨命之愆也居士竭力弘護即此是大學問大精進古人云從緣薦得相應疾就體消停得力遲又云向上事須從向下會取豈欺我哉但貴善自著眼而已聖譬則力智譬則巧雖筈筈相拄非復巧力所及終亦不離巧力居士以為何如榔梅居士夙欽道風乃復佳貺遠頒尤徵樂善之懷愧感兼集但山野廢衲不敢浪通名字統祈鼎言致謝為囑偶讀地藏三經述出讚禮懺願儀一卷擬作救時單方未審當尊意否餘情非筆舌所罄統希心照不宣寄韓蓮洲客歲閏月得接手教不覺又易歲矣流光如駛衰病相仍捨卻樂邦何處送想此意願與仁者共之故鄉本即法界我今不離法界即是不離故鄉設更欲飛錫故鄉則故鄉又在法界外矣至于度人桑梓自是入廛垂手邊事不見悉達囑車匿云設我骸骨枯腐不盡生老病死之原誓不返還豈可謂悉達置故鄉于度外又豈可謂不肖今已成道不比踰城出家時耶仁者屢遭拂逆當是夙因所感亦是今生善力深厚轉重受輕之局但于隨緣消舊業更莫造新殃二語不妨再思十思必自有解脫路也地遠緣疏音問不能相續惟神棲安養一念千里同風終不以暌違為隔耳寄靈隱兄兼訊影渠病臥荒山無時不念及仁兄仁兄眼目志識俱足千古而不能千古者只是缺剛骨也久欲作一方便為二兄結伴修行計無奈福緣淺薄兼以惡疾纏身今疾雖漸愈緣似尚慳亦祈仁兄挺出剛骨俯就幾分則深山坐對庶可期耳合注緣起壇中十問附政向蒙許華嚴大鈔未審何時發來意欲細閲一遍求其與台宗真實相出入處庶可息從前諍論為申積冤否則悠悠門外之談殊未足憑據也聞二兄于台宗教觀已有信入猶願潛心討徹源底為他日相晤時快談張本嗚呼流光如駛衰老日侵既自反而痛心乃敢為同志饒舌幸勿罪其狂瞽影師近目法體何似乞示好音復項居士回音藹然深悉道況兼承厚施為謝但細讀扇頭和偈未免落在口頭三昧大似初生牛犢不畏虎居士向本正信篤實今何忽弄此虛頭耶豈不見古人錯下一語五百世墮野狐身奈何妄談般若作拔舌犁耕種子萬祈戒之勿視作等閒也山僧一行一止各有因緣漫以趙州相擬殊為未確夫帝鄉可遊也皈戒之心不可忘也詩偈可作也儱侗套語不可襲也紅塵堆裏學山居風塵何能染人只恐人自染風塵耳後會未期聊進藥石以酬一日之知餘非所計臨楮神馳雜文弔溫陵開元寺肖滿師伯文嗚呼水漲船高泥多佛大從來間世之英豪出現未有不因培植厚德而致之者也豫之得稔知老伯厚德也因獲借交於高足如是昉師也而昉師之與豫莫逆也則又因惺谷壽師聯出世盟也惺谷以居士身倡修證法門於泉南佛國是時法化久息疑謗頗多獨昉師極力為之表裏而老伯實克成之至於昉師同壽師行腳遍參海內知識遍交海內勝友費卻草鞋錢凡若干數盡取給於老伯之精舍曾無倦色又老伯每以淳厚雅度化導緇素目擊道存不言而喻且勤營福業不吝鉢資供養三寶惟虞簡缺是以法事之殷勤儀節之周備不惟溫陵一境親炙成風而八閩上下亦且聞風興起無怪乎其克享眉壽允裕後昆也嗚呼末世障深競騁狂慧持戒修福鄙其有為匪藉先輩孰為典刑老伯固應住世一劫昭示未來而蓮蕊欲敷侍者不請遂踵隻履之風豈不痛哉豫每悲法道陵夷魔外充斥目不忍見耳不忍聞遁跡深山甘群野獸而昉師猶衝風破浪冒死捐生尋豫於數千里外法道重於丘嶽身命等於鴻毛雖剛骨弘誓稟自夙習其受滋培於老伯者亦豈可思議也獨嗟昉師初出老伯旋終於世法中不無永別之恨然得此賢嗣毅然以荷擔法門為己任克其志操決堪光顯如來道化則老伯亦誠可無憾矣豫聞諸儒禮云知生者弔知死者傷豫雖不獲親奉慈顏乃藉昉師而神沐至德今之望薰風而灑淚不亦宜乎弔知白文嗚呼習俗移人賢智不免法門日替僧體益卑求其矜然有以自拔者幾何人哉維我知白朋公托跡名山希心禪理不染時流之陋習克臻先哲之典型秉歸戒而畢志茹蔬聞佛乘而欣懷染指力疾投身于萬德洗心畢露其千尤豫方慶緇侶有人山靈增色擬從閩地言旋永締蓮邦淨社誰謂暫離三月之間遂作千秋之隔嗚呼無常巨力抑何奪吾良友之速也四十六年幻夢雖然當下圓消九十九峰家業畢竟憑誰同紹見其進未見其止已堪為法門歎惜可共學未可適道尤足為身心隱憂公靈不昧必能憶大乘止觀法門信淨土橫超捷徑則千佛社裏雖少一人九蓮池內新敷一萼公既死而不死豫亦怨而無怨矣公其含笑而存鑒之疏萬鉢緣疏一滴水耳而蛟龍得之為雲為霧普洽寰區其功果在於水耶果在於龍耶果非水與龍之功耶謂功在於水則均此一滴胡以日曝之而乾火炙之而亦乾即渴人飲之亦不足以潤其舌謂功在於龍則置諸高原尚不免有熱砂之痛宛轉之苦謂功不在龍與水則胡以二物相遇遂得相成龍既不可思議水亦不可思議噫此亦可以悟法界妙理矣而更可以喻修證要門蓋水猶福也龍猶慧也水龍之性即真如法性也倘水性非真如性本不能周遍法界縱遇真龍豈能令其騰波湧浪倘龍性非真如性本不能神明出沒縱遇真水豈能令其變化飛騰惟以稱性之龍御稱性之水則龍靈而水亦靈亦惟以稱性之水得稱性之龍則水妙而龍更妙福慧二途亦復如是修福不修慧福則有漏有為有分劑有窮盡修慧不修福慧則無光無焰無力用無莊嚴惟以稱性之福資稱性之慧如得水之龍雖小亦不可欺亦惟稱性之慧作稱性之福如遇龍之水雖少亦不可盡而福慧二輪又惟以同一法性故皆不可思議倘一塵福聚本不等於法界胡能使二錢微供頓超匿王四十里燈倘一念真明本不徹於全體胡能使一放屠刀便預賢劫千佛大數是以修慧必須真莫類蛇虺之不能騰駕修福不須擇莫如海鱉之但誇水多然慧門嚴真僞之辨取捨貴精福門融大小之岐隨緣愈妙所以出家三學討究歸於師友日用四事供膳托於檀那師友必擇而後精檀那必等而後普欲行等慈誠莫若萬鉢緣之設矣人輸一鉢為力甚易集之成萬為福甚多如一室中具足萬燈一一燈明各遍室內當知施一鉢者即已圓具萬鉢功德又況燈燈相續焰焰轉明熟食除暝功遍一切寧止於萬鉢功德而已多亦法界少亦法界少即法界故施一鉢者不必愧其薄多即法界故施無數鉢者不宜厭其奢古人云善人行善惟日不足華嚴云十大願王無厭無足請於此法性海中興大法雲注大法雨滴滴總歸大海莫問斯水何來亦莫問斯水何去矣蘊空精舍募建華嚴閣疏自佛法流傳震旦經帙之最富者莫若華嚴其最簡者莫若心經心經語僅數百雖童子亦能誦之華嚴則浩然八十餘帙雖老宿亦未必盡諳也顧究其旨趣廣略互收只如心經照見五蘊皆空一語人皆知之第未審其以何為照也若照以邪慧則謂死後無相為空若照以聲聞般若則六分推析覓我了不可得為空若照以緣起般若則體虛無性如幻如夢為空若照以不共般若則二邊叵得離過絶非為空惟照以甚深般若則色等諸法全即法界體絶纖塵量窮橫豎遍具遍含無障無礙為空依此修觀則法法隨心名觀自在塵塵圓具亦名普賢妙智融徹亦名文殊大慈普覆亦名彌勒法身真常亦名毗盧上中下三部華嚴一言可蔽巍巍寶閣煥乎在心目間更何俟謀諸土木耶雖然華嚴以六相明宗不有壞之孰為成之不有其別孰彰其總不有其異孰顯其同則土木一案正不可少十玄門中所謂托事表法生解也舉凡輸粟布金者一切與此甚深般若相應如空合空如水投水人人歡喜鼓舞於自性中何必更贅一言為勸而又何妨藉此一言為勸以此一言亦全是法性故主募事僧為惺凡開士請以此法自惺惺他海燈油疏劫初時人有身光不假日月光明身光漸減日月出生而日月光明復有時不能遍照則繼之以膏火此膏火功德不惟等於日月而已日月照臨屬於悲田燈火供養悲敬雙具又況地藏大士以無緣慈力同體悲心示居九子峰頭遍救塵沙含識肉身靈塔四海歸依由是有海燈之供表善信之微忱當知一莖光照全彰自性妙明緣善既發正了同顯倘謂此是事相或是塵緣無關修證者則離事談理離境覓心理若龜毛心同兔角誰與萬善莊嚴成兩足果昔有一賊因盜寺物為佛剔燈光明尚感多劫身有光明之報況以好心施供藉大士慈悲俾焰焰普燭幽塗方將續如來慧燈耀法界寶炬若自若他同開長夜幽關又豈止生死中之樂報已耶請速發心毋貽後悔芙蓉閣建華嚴期疏此山自李青蓮有秀出芙蓉之句而九華之名始彰今印如開士構一樓於化城寺側稱之為芙蓉閣倘亦有味乎青蓮句也開士復發弘願即于此閣轉大法輪欲建三年華嚴道場僧侶以十二為數檀越以八十一為緣每緣于一年中助米一石二斗助銀一兩二錢共須八十一緣或一人獨任數緣或幾人共成一緣無不可者圓滿之日仍以懺摩回向法界甚盛舉也開士既發此心兼徵豫一言為勸豫每謂地藏本願一經當與八十一卷華嚴並參華嚴明佛境界稱性不可思議本願明地獄境界亦稱性不可思議一則順性而修享不思議法性之樂一則逆性而修受不思議法性之苦順逆雖殊其為全性起修全修在性則一也吾人若一念迷佛界不思議性則常寂光土應念化成刀山劍樹爐炭鑊湯若一念悟地獄不思議性則泥犁苦具應念化成普光明殿寂滅道場迷悟雖殊其於性德無增無減又一也然性德雖無增無減非逆非順不屬迷悟而迷之則為九界逆修遂感分段變易二死苦報悟之則為佛界順修遂成菩提涅槃二種轉依迷為三惑悟為三智逆修為十惡五逆順修為六度萬行生死為三界四相轉依為三身四德苦即法身惑即般若業即解脫諺所謂推人扶人只是一手讚人毀人只是一口大佛頂所謂如水成冰冰還成水詎不信然則芙蓉九朵信可與華嚴九會同其表法豈謂地藏本願經僅談地獄因果事相而已況華藏世界安住於大蓮華中如來成道亦復坐寶蓮華而優鉢羅波頭摩等地獄亦復名青蓮華赤蓮華可見一名一喻一事一法皆悉具足十界誠在當人之迷悟順逆何如耳不思議法性體非群相不礙諸相發揮又奚間於地獄及寂光哉願開士率諸檀越及誦經緇侶即以此為順修因緣開發正悟則鐵圍兩山即是金剛菩提道場無令火焰幻作金蓮如慈悲懺法所云斯大妙矣是為勸九華山營建衆僧塔疏福田有二曰敬曰悲敬田以田勝悲田以心勝供舍利而福等虛空敬田也澤及枯骨而萬世稱為仁主悲田也但有一田功德已不思議況悲敬具足者乎悲敬具足則天下叢席之普同塔是也夫羅漢四果證入無生永離我執既入涅槃不復愛此朽骨凡夫比丘未斷思惑倘尸骸暴露則神識不安神識不安可悲也堂堂僧寶可敬也矧凡聖莫測安知肉眼所謂凡僧非即大士所曲示乎是故隨供一骨罔不具豫悲敬二田此即小小道場必備此事維九華為天下第一名山乃乏茲要典耶然九華亦非全乏奈前人作事草率不足垂於久遠致令荒原暴骨悚日傷心豫初到山首以此事經懷因病苦所困不克議始今賴大士弘慈惡疾退舍方擬捨身命而力營之適有衆位耆宿無不先得我心而又十倍豫力相與快為鼓舞豫遂不揣陋拙僭言倡始兼願集百金以助厥成其有見聞隨喜無論若緇若素但肯隨喜樂助亦無論若多若少既投最勝之因必克無上之果敬則成佛道而有餘悲則度衆生而無量係以偈曰僧相堂堂福德之海縱令朽骨福性奚改起塔供養應至梵天況復丈許詎云不然三百餘金衆緣成就銖兩分文成佛無謬彈指合掌的的真因誰為證佐妙法華經止觀山房改向文疏昔世尊將成正覺登一山頂山為振裂世尊念曰得毋我夙障耶山神跪而白曰非是菩薩夙障秖緣斯山淺薄不足載如來成道耳去熙連河側不遠有菩提場周匝千里金剛所成三世諸佛咸悉坐此成等正覺佛如其言詣彼成道由此觀之風水所係亦大矣世有高談唯心蔑視風水者詎思一切唯心則風水獨非唯心法門乎是故華藏莊嚴世界海安住無邊香水海中無邊香水海依大風輪而得安住此即風水之本源而唯心之極致也今于此法界安立中有塵許娑婆娑婆中有塵許支那支那中復有塵許之新安陽山尖而塵許之法界不小華藏之法界不大擬欲向此一塵中轉大法輪奈向日所定方隅未為允妥事須改作方得依正相稱蓋不必再作布金之侈費便可坐收熙連河畔之奇功矣深信唯心法門者請于此薦取持地圓通助刻芳名賢菴海蒼德賢傅福性超常融性溟性學顯悟秉才寂洪照衡傳善弘淨定瑞海秀覺心如明傅照信傅照蓮傅普見傅普敬照安傅普持傅普善傅普壽藍元善章明生弟子照芳照瑞同募寶全性印
